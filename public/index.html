<!DOCTYPE html>
<html>
<head>
<title>ZUNO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#0f2027,#203a43);
  color:white;
  overflow:hidden; /* 🔥 no scroll */
}

/* LOGIN */
#login{text-align:center;margin-top:100px;}

input{
  padding:12px;
  width:250px;
  margin:10px;
  border-radius:10px;
  border:none;
}

/* APP */
#app{display:none;height:100vh;flex-direction:column;}

.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

.coin{
  background:gold;
  color:black;
  padding:5px 15px;
  border-radius:20px;
}

/* MAIN */
#main{display:flex;flex:1;}

#videoSide{
  width:65%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

.videoBox{
  width:320px;
  height:320px;
  background:black;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CAMERA UI */
.deviceUI{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.7);
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* CHAT */
#chatSide{
  width:35%;
  background:#111;
  display:flex;
  flex-direction:column;
}

#statusText{padding:10px;color:yellow;}
#chat{flex:1;padding:10px;overflow:auto;}

.chatInput{display:flex;padding:10px;}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:cyan;
  margin:5px;
}

/* 🔥 MODALS */
.modal{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  border-radius:15px;
  z-index:100;
  text-align:center;
}

.close{
  position:absolute;
  top:5px;
  right:10px;
  cursor:pointer;
  color:red;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h1>ZUNO</h1>
<input id="name" placeholder="Name"><br>
<input id="age" type="number" placeholder="Age"><br>
<button onclick="login()">Enter</button><br>
<button onclick="openTerms()">Terms</button>
</div>

<!-- TERMS -->
<div id="termsModal" class="modal">
<span class="close" onclick="closeTerms()">❌</span>
<p>18+ only. No abuse or nudity.</p>
</div>

<!-- PREMIUM -->
<div id="premiumModal" class="modal">
<span class="close" onclick="closePremium()">❌</span>
<h3>Premium</h3>
<button onclick="buy(200,2)">Platinum (2h)</button><br>
<button onclick="buy(500,10)">Gold (10h)</button><br>
<button onclick="buy(1000,24)">Diamond (24h)</button>
</div>

<!-- REPORT -->
<div id="reportModal" class="modal">
<span class="close" onclick="closeReport()">❌</span>
<h3>Report</h3>
<button onclick="report('Abuse')">Abuse</button><br>
<button onclick="report('Violence')">Violence</button><br>
<button onclick="report('Nude')">Nude</button>
</div>

<!-- HISTORY -->
<div id="historyModal" class="modal">
<span class="close" onclick="closeHistory()">❌</span>
<h3>Chat History</h3>
<div id="historyBox"></div>
</div>

<!-- APP -->
<div id="app">

<div class="top">
<button onclick="watchAd()">Ads</button>
<div class="coin">🪙 <span id="coins">20</span></div>
<div>
<button onclick="openPremium()">Premium</button>
<button onclick="openReport()">Report</button>
<button onclick="openHistory()">History</button>
</div>
</div>

<div id="main">

<div id="videoSide">

<div class="videoBox">
<video id="me" autoplay muted playsinline></video>

<div id="deviceUI" class="deviceUI">
<button onclick="flipCamera()">Flip Camera</button><br>
<select id="cameraSelect"></select><br>
<select id="micSelect"></select>
</div>

</div>

<div class="videoBox">
<video id="stranger" autoplay playsinline></video>
</div>

<div>
<button onclick="start()">Start</button>
<button onclick="next()">Next</button>
<button onclick="end()">End</button>
</div>

</div>

<div id="chatSide">
<div id="statusText">Ready</div>
<div id="chat"></div>

<div class="chatInput">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

</div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
let stream;
let socket;
let facing="user";
let history=[];

/* LOGIN */
function login(){
if(age.value<18){alert("18+ only");return;}
login.style.display="none";
app.style.display="flex";
coins.innerText=200;
socket = io("https://zuno-app.onrender.com");
}

/* TERMS */
function openTerms(){termsModal.style.display="block";}
function closeTerms(){termsModal.style.display="none";}

/* PREMIUM */
function openPremium(){premiumModal.style.display="block";}
function closePremium(){premiumModal.style.display="none";}

function buy(cost,hours){
if(parseInt(coins.innerText)<cost){alert("Not enough coins");return;}
coins.innerText=parseInt(coins.innerText)-cost;
alert("Premium activated "+hours+" hours");
}

/* REPORT */
function openReport(){reportModal.style.display="block";}
function closeReport(){reportModal.style.display="none";}

function report(type){
alert("Reported: "+type);
}

/* HISTORY */
function openHistory(){
historyModal.style.display="block";
historyBox.innerHTML=history.join("<br>");
}
function closeHistory(){historyModal.style.display="none";}

/* STATUS */
function showStatus(t){statusText.innerText=t;}

/* START */
async function start(){
showStatus("Connecting...");
stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:facing,width:{ideal:640},height:{ideal:480}},
audio:true
});
me.srcObject=stream;
deviceUI.style.display="none";
socket.emit("start");
}

/* END */
function end(){
showStatus("Ended");
if(stream){
stream.getTracks().forEach(t=>t.stop());
stream=null;
me.srcObject=null;
}
deviceUI.style.display="block";
stranger.srcObject=null;
socket.emit("end");
}

/* NEXT */
function next(){end();setTimeout(start,500);}

/* FLIP */
function flipCamera(){
facing=facing==="user"?"environment":"user";
end();setTimeout(start,300);
}

/* CHAT */
function send(){
if(!msg.value)return;
let text="You: "+msg.value;
history.push(text);
let d=document.createElement("div");
d.innerText=text;
chat.appendChild(d);
msg.value="";
}

/* ADS */
function watchAd(){
setTimeout(()=>{
coins.innerText=parseInt(coins.innerText)+20;
},1000);
}

/* DEVICES */
navigator.mediaDevices.enumerateDevices().then(d=>{
d.forEach(x=>{
let o=document.createElement("option");
o.value=x.deviceId;
o.text=x.label||x.kind;
if(x.kind==="videoinput")cameraSelect.appendChild(o);
if(x.kind==="audioinput")micSelect.appendChild(o);
});
});
</script>

</body>
</html>
