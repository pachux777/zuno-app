<!DOCTYPE html>
<html>
<head>
  <title>Zuno</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background:#0a0a0a;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    #videoBox {
      display:flex;
      justify-content:center;
      gap:20px;
      margin-top:20px;
    }

    video {
      width:320px;
      height:240px;
      border-radius:10px;
      background:black;
    }

    button {
      padding:10px;
      margin:5px;
      border-radius:10px;
      border:none;
      background:cyan;
      color:black;
      font-weight:bold;
    }

    input {
      padding:10px;
      margin:5px;
    }

    #chatBox {
      height:120px;
      overflow:auto;
      border:1px solid gray;
      width:60%;
      margin:auto;
    }

    @media (max-width:768px){
      #videoBox { flex-direction:column; }
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h1>ZUNO</h1>
  <input id="username" placeholder="Name"><br>
  <input id="age" type="number" placeholder="Age"><br>
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<h1>ZUNO</h1>

<div id="videoBox">
  <div>
    <h3>YOU</h3>
    <video id="localVideo" autoplay muted></video>
  </div>

  <div>
    <h3>STRANGER</h3>
    <video id="remoteVideo" autoplay></video>
  </div>
</div>

<br>

<button onclick="startChat()">Start</button>
<button onclick="nextUser()">Next</button>
<button onclick="endChat()">End</button>

<br><br>

<input id="msgInput">
<button onclick="sendMsg()">Send</button>

<div id="chatBox"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
