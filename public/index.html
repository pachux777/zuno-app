<!DOCTYPE html>
<html>
<head>
<title>Zuno</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:#0a0a0a;color:white;font-family:Arial;text-align:center;}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

.leftBtns button, .rightBtns button{
  margin:3px;
}

.coinBox{
  background:gold;
  color:black;
  padding:5px 10px;
  border-radius:10px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:cyan;
  cursor:pointer;
}

video{
  width:450px;
  height:300px;
  background:black;
  border-radius:10px;
}

#videoBox{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:10px;
}

#loading{
  display:none;
  font-size:18px;
}

@media(max-width:768px){
  video{width:48%;height:320px;}
  button{width:80%;font-size:18px;}
}
</style>
</head>

<body>

<div id="loginPage">
<h1>ZUNO</h1>
<input id="name" placeholder="Name"><br>
<input id="age" type="number" placeholder="Age"><br>
<button onclick="login()">ENTER</button>
</div>

<div id="app" style="display:none;">

<div class="topbar">

<div class="leftBtns">
<button onclick="watchAd()">🎬 +20</button>
<button onclick="openPremium()">💎</button>
</div>

<div class="coinBox">🪙 <span id="coins">0</span></div>

<div class="rightBtns">
<button onclick="showHistory()">🕘</button>
<button onclick="reportUser()">🚨</button>
</div>

</div>

<div id="loading">🔄 Finding match...</div>

<div id="videoBox">
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

<button onclick="startChat()">Start</button>
<button onclick="nextUser()">Next</button>
<button onclick="endChat()">End</button>

<input id="msg" oninput="typing()">
<button onclick="sendMsg()">Send</button>

<div id="typing"></div>
<div id="chatBox"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
