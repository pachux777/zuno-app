<!DOCTYPE html>
<html>
<head>
<title>Zuno</title>

<style>
body{
  background:linear-gradient(45deg,#000,#001f2f);
  color:white;
  text-align:center;
  font-family:Arial;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

/* BUTTON STYLE */
button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}
button:active{ transform:scale(0.9); }

.coin{background:gold;color:black;}
.premium{background:cyan;}
.report{background:red;color:white;}

#videoBox{
  display:flex;
  justify-content:center;
  gap:20px;
}

video{
  width:320px;
  height:240px;
  background:black;
  border-radius:10px;
}

/* SHOP */
#shop{
  display:none;
  background:#111;
  padding:10px;
  margin:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<h1>ZUNO</h1>
<input id="username" placeholder="Name"><br>
<input id="age" type="number" placeholder="Age"><br>
<button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="topbar">

<div>
🪙 <span id="coinCount">0</span>
<button class="coin" onclick="watchAd()">+20</button>
</div>

<div>
<button onclick="showHistory()">💬</button>
<button class="premium" onclick="toggleShop()">💎</button>
<button class="report" onclick="reportUser()">🚨</button>
</div>

</div>

<div id="shop">
<button onclick="buyPremium(100,2)">2H - 100</button>
<button onclick="buyPremium(500,10)">10H - 500</button>
<button onclick="buyPremium(1000,24)">24H - 1000</button>
</div>

<h3 id="status">Ready</h3>

<div id="videoBox">
<div>
<h3>YOU</h3>
<video id="localVideo" autoplay muted></video>
</div>

<div>
<h3>STRANGER</h3>
<video id="remoteVideo" autoplay></video>
</div>
</div>

<br>

<button onclick="startChat()">Start</button>
<button onclick="nextUser()">Next</button>
<button onclick="endChat()">End</button>

<br><br>

<input id="msgInput">
<button onclick="sendMsg()">Send</button>

<div id="chatBox"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
