<!DOCTYPE html>
<html>
<head>
<title>ZUNO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#0f2027,#203a43);
  color:white;
  overflow:hidden;
}

/* LOGIN */
#login{
  text-align:center;
  margin-top:120px;
}

#login h1{
  font-size:40px;
}

input{
  padding:12px;
  width:260px;
  margin:8px;
  border-radius:10px;
  border:none;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#111;
}

.left, .right{
  display:flex;
  gap:10px;
}

.coin{
  background:gold;
  color:black;
  padding:6px 18px;
  border-radius:20px;
  font-weight:bold;
}

/* MAIN */
#app{
  display:none;
  height:100vh;
  flex-direction:column;
}

#main{
  flex:1;
  display:flex;
  height:calc(100vh - 60px);
}

/* VIDEO SIDE */
#videoSide{
  width:60%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

/* CAMERA */
.videoBox{
  width:min(38vh, 380px);
  height:min(38vh, 380px);
  background:black;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
}

.videoBox video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CHAT SIDE */
#chatSide{
  width:40%;
  display:flex;
  flex-direction:column;
  background:#111;
}

#chat{
  flex:1;
  padding:10px;
  overflow:auto;
}

.chatInput{
  padding:10px;
}

/* BUTTON */
button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:cyan;
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}

.controls{
  text-align:center;
}

/* TOGGLE BUTTONS */
.toggleBtns{
  display:flex;
  gap:10px;
  justify-content:center;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  border-radius:10px;
}

.closeBtn{
  position:absolute;
  top:5px;
  right:10px;
  cursor:pointer;
  color:red;
  font-weight:bold;
}

/* MOBILE */
@media(max-width:768px){
  #main{
    flex-direction:column;
  }
  #videoSide, #chatSide{
    width:100%;
  }

  .videoBox{
    width:80vw;
    height:80vw;
  }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h1>⚡ ZUNO ⚡</h1>
<input id="name" placeholder="Name"><br>
<input id="age" type="number" placeholder="Age"><br>
<button onclick="login()">Enter</button><br>
<button onclick="openTerms()">Terms & Policy</button>
</div>

<!-- TERMS -->
<div id="terms" class="modal">
<span class="closeBtn" onclick="closeTerms()">✖</span>
<h3>Terms & Policy</h3>
<p>18+ only. No abuse. No nudity. Respect others.</p>
</div>

<!-- MAIN -->
<div id="app">

<div class="top">
<div class="left">
<button onclick="watchAd()">Ads</button>
</div>

<div class="coin">🪙 <span id="coins">0</span></div>

<div class="right">
<button onclick="openPremium()">Premium</button>
<button onclick="openReport()">Report</button>
<button onclick="loadHistory()">History</button>
</div>
</div>

<div id="main">

<!-- VIDEO -->
<div id="videoSide">

<div class="videoBox">
<video id="me" autoplay muted></video>
</div>

<div class="videoBox">
<video id="stranger" autoplay></video>
</div>

<!-- CAMERA + MIC -->
<div class="toggleBtns">
<button onclick="toggleCam()">🎥 Camera</button>
<button onclick="toggleMic()">🎤 Mic</button>
</div>

<!-- CONTROLS -->
<div class="controls">
<button onclick="start()">Start</button>
<button onclick="next()">Next (-2)</button>
<button onclick="end()">End</button>

<br><br>

<select id="gender">
<option>All</option>
<option>Boys</option>
<option>Girls</option>
</select>

</div>

</div>

<!-- CHAT -->
<div id="chatSide">
<div id="chat"></div>

<div class="chatInput">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

</div>
</div>

<!-- PREMIUM -->
<div id="premiumBox" class="modal">
<span class="closeBtn" onclick="premiumBox.style.display='none'">✖</span>
<h3>Premium</h3>
<button onclick="buy(200,2)">Platinum</button>
<button onclick="buy(500,10)">Gold</button>
<button onclick="buy(1000,24)">Diamond</button>
</div>

<!-- REPORT -->
<div id="reportBox" class="modal">
<span class="closeBtn" onclick="reportBox.style.display='none'">✖</span>
<h3>Report</h3>
<button onclick="ban()">Nudity</button>
<button onclick="ban()">Violence</button>
<button onclick="ban()">Abuse</button>
</div>

<!-- HISTORY -->
<div id="historyBox" class="modal">
<span class="closeBtn" onclick="historyBox.style.display='none'">✖</span>
<h3>History</h3>
<ul id="historyList"></ul>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

<script>
let stream;

/* CAMERA */
async function start(){
  stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  me.srcObject = stream;
  socket.emit("start");
}

/* END FIX */
function end(){
  if(stream){
    stream.getTracks().forEach(track=>track.stop());
    me.srcObject=null;
  }
  socket.emit("end");
}

/* TOGGLE */
function toggleCam(){
  stream.getVideoTracks()[0].enabled =
  !stream.getVideoTracks()[0].enabled;
}

function toggleMic(){
  stream.getAudioTracks()[0].enabled =
  !stream.getAudioTracks()[0].enabled;
}
</script>

</body>
</html>
