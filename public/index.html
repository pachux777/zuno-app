<!DOCTYPE html>
<html>
<head>
<title>Zuno</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}

/* LOGIN FULL SCREEN */
#loginPage{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

input{
  width:80%;
  padding:15px;
  margin:10px;
  font-size:18px;
  border-radius:10px;
  border:none;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
  transition:0.2s;
}

button:active{
  transform:scale(0.9);
}

/* VIDEO */
#videoBox{
  display:flex;
  gap:10px;
  justify-content:center;
}

video{
  width:320px;
  height:240px;
  background:black;
  border-radius:10px;
}

/* MOBILE */
@media(max-width:768px){
  video{
    width:48%;
    height:300px;
  }

  button{
    width:90%;
    font-size:18px;
  }
}

/* PREMIUM FULL SCREEN */
#premiumUI{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#111;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* CARDS */
.card{
  background:#222;
  padding:20px;
  margin:10px;
  border-radius:15px;
  width:80%;
}

.gold{background:gold;color:black;}
.blue{background:cyan;color:black;}
.pink{background:magenta;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<h1>ZUNO</h1>
<input id="age" type="number" placeholder="Enter Age">
<button onclick="login()">ENTER</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="topbar">
<div>
🪙 <span id="coinCount">0</span>
<button onclick="watchAd()">+20</button>
</div>

<div>
<button onclick="openPremium()">💎</button>
</div>
</div>

<div id="videoBox">
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

<button onclick="startChat()">Start</button>
<button onclick="nextUser()">Next</button>
<button onclick="endChat()">End</button>

<input id="msgInput">
<button onclick="sendMsg()">Send</button>

<div id="chatBox"></div>

</div>

<!-- PREMIUM -->
<div id="premiumUI">

<h2>💎 PREMIUM</h2>

<div class="card gold">
<h3>2 HOURS</h3>
<p>100 Coins</p>
<button onclick="buy(100,2)">BUY</button>
</div>

<div class="card blue">
<h3>10 HOURS</h3>
<p>500 Coins</p>
<button onclick="buy(500,10)">BUY</button>
</div>

<div class="card pink">
<h3>24 HOURS</h3>
<p>1000 Coins</p>
<button onclick="buy(1000,24)">BUY</button>
</div>

<button onclick="closePremium()">CLOSE</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
