<!DOCTYPE html>
<html>
<head>
<title>Zuno</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:white;
  font-family:Arial;
  text-align:center;
}

/* LOGIN */
#loginPage{
  margin-top:100px;
}

input{
  padding:10px;
  margin:8px;
  border-radius:8px;
  border:none;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

/* BUTTON */
button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:cyan;
  cursor:pointer;
}

/* VIDEO */
#videoBox{
  display:flex;
  justify-content:center;
  gap:20px;
}

video{
  width:320px;
  height:240px;
  background:black;
  border-radius:10px;
}

/* MOBILE ONLY BIG UI */
@media(max-width:768px){

  #loginPage{
    margin-top:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }

  input{
    width:80%;
    padding:15px;
    font-size:18px;
  }

  button{
    width:80%;
    font-size:18px;
    padding:15px;
  }

  video{
    width:48%;
    height:300px;
  }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<h1>ZUNO</h1>

<input id="name" placeholder="Enter Name"><br>
<input id="age" type="number" placeholder="Enter Age"><br>

<button onclick="login()">ENTER</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="topbar">
<div>🪙 <span id="coins">0</span></div>
<button onclick="watchAd()">+20</button>
</div>

<div id="videoBox">
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

<br>

<button onclick="startChat()">Start</button>
<button onclick="nextUser()">Next</button>
<button onclick="endChat()">End</button>

<br><br>

<input id="msg">
<button onclick="sendMsg()">Send</button>

<div id="chatBox"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
