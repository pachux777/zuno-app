<!DOCTYPE html>
<html>
<head>
<title>Zuno</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  background:linear-gradient(135deg,#000,#0f2027,#203a43);
  color:white;
  text-align:center;
  font-family:Arial;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

.coin{
  background:gold;
  color:black;
  padding:6px 15px;
  border-radius:20px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:cyan;
  margin:4px;
  cursor:pointer;
}

/* VIDEO */
#videos{
  display:flex;
  justify-content:center;
  gap:15px;
}

video{
  width:420px;
  height:280px;
  background:black;
  border-radius:10px;
}

/* AD BOX */
#adBox{
  display:none;
  background:#111;
  padding:15px;
  margin:10px;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="top">
<div>
<button onclick="openAd()">🎬 Ads</button>
<button onclick="openPremium()">💎</button>
</div>

<div class="coin">🪙 <span id="coins">0</span></div>

<div>
<button onclick="showHistory()">🕘</button>
<button onclick="report()">🚨</button>
</div>
</div>

<!-- AD WAIT -->
<div id="adBox">
<h3>⏳ Watch Ad...</h3>
<p id="timer">8</p>
<button id="claimBtn" disabled onclick="claimReward()">Claim +20</button>
</div>

<div id="videos">
<video id="me" autoplay muted></video>
<video id="stranger" autoplay></video>
</div>

<button onclick="start()">Start</button>
<button onclick="next()">Next</button>
<button onclick="end()">End</button>

<input id="msg">
<button onclick="send()">Send</button>

<div id="chat"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
