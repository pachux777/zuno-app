<!DOCTYPE html>
<html>
<head>
<title>ZUNO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#0f2027,#203a43);
  color:white;
  overflow:hidden;
}

/* LOGIN */
#login{
  text-align:center;
  margin-top:120px;
}

#login h1{
  font-size:40px;
}

input{
  padding:12px;
  width:260px;
  margin:8px;
  border-radius:10px;
  border:none;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#111;
}

.coin{
  background:gold;
  color:black;
  padding:6px 18px;
  border-radius:20px;
}

/* MAIN */
#app{
  display:none;
  height:100vh;
  flex-direction:column;
}

#main{
  flex:1;
  display:flex;
}

/* VIDEO */
#videoSide{
  width:65%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

.videoBox{
  width:min(38vh,380px);
  height:min(38vh,380px);
  background:black;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

/* 🔥 FIX CAMERA FIT */
.videoBox video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 🔥 DEVICE UI */
.deviceUI{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:10px;
  z-index:5;
}

/* CHAT */
#chatSide{
  width:35%;
  background:#111;
  display:flex;
  flex-direction:column;
}

#statusText{
  padding:8px;
  color:yellow;
}

#chat{
  flex:1;
  padding:10px;
  overflow:auto;
}

.chatInput{
  padding:10px;
  display:flex;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:cyan;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="login">
<h1>⚡ ZUNO ⚡</h1>
<input id="name" placeholder="Enter Name"><br>
<input id="age" type="number" placeholder="Enter Age"><br>
<button onclick="login()">Enter</button><br>

<!-- 🔥 ADDED TERMS BUTTON -->
<button onclick="openTerms()">Terms</button>
</div>

<div class="modal" id="termsModal">
<p>18+ only. No abuse or nudity.</p>
<button onclick="closeTerms()">Close</button>
</div>

<div id="app">

<div class="top">
<button onclick="watchAd()">Ads</button>
<div class="coin">🪙 <span id="coins">20</span></div>

<div>
<button onclick="openPremium()">Premium</button>
<button onclick="openReport()">Report</button>
<button onclick="loadHistory()">History</button>
</div>
</div>

<div id="main">

<div id="videoSide">

<div class="videoBox">

<div id="deviceUI" class="deviceUI">
<select id="cameraSelect"></select><br>
<select id="micSelect"></select>
</div>

<video id="me" autoplay muted playsinline></video>

</div>

<div class="videoBox">
<video id="stranger" autoplay playsinline></video>
</div>

<div>
<button onclick="start()">Start</button>
<button onclick="next()">Next</button>
<button onclick="end()">End</button>
</div>

</div>

<div id="chatSide">
<div id="statusText">Ready</div>
<div id="chat"></div>

<div class="chatInput">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

<script>
let stream;
let socket;

/* LOGIN */
function login(){
if(age.value<18){alert("18+ only");return;}
login.style.display="none";
app.style.display="flex";
coins.innerText=200;

socket = io("https://zuno-app.onrender.com");
}

/* TERMS */
function openTerms(){termsModal.style.display="block";}
function closeTerms(){termsModal.style.display="none";}

/* STATUS */
function showStatus(t){
statusText.innerText=t;
}

/* START */
async function start(){

showStatus("🔍 Connecting...");

/* 🔥 FIX CAMERA (NO AUTO OFF) */
stream = await navigator.mediaDevices.getUserMedia({
video:{width:{ideal:640},height:{ideal:480}},
audio:true
});

me.srcObject = stream;

/* 🔥 HIDE CAMERA UI (LIKE OMEGLE) */
deviceUI.style.display="none";

if(socket) socket.emit("start");
}

/* END */
function end(){

showStatus("❌ Ended");

/* 🔥 FULL STOP CAMERA */
if(stream){
stream.getTracks().forEach(t=>t.stop());
me.srcObject=null;
stream=null;
}

/* 🔥 SHOW CAMERA SETTINGS BACK */
deviceUI.style.display="block";

stranger.srcObject=null;

if(socket) socket.emit("end");
}

/* NEXT */
function next(){
end();
setTimeout(start,500);
}

/* 🔥 FIX TOP BUTTONS */
function watchAd(){
setTimeout(()=>{
coins.innerText=parseInt(coins.innerText)+20;
},1000);
}

function openPremium(){ alert("Premium coming soon"); }
function openReport(){ alert("Report coming soon"); }
function loadHistory(){ alert("History coming soon"); }

/* CHAT */
function send(){
if(!msg.value)return;
let d=document.createElement("div");
d.innerText="You: "+msg.value;
chat.appendChild(d);
msg.value="";
}

/* DEVICES */
navigator.mediaDevices.enumerateDevices().then(d=>{
d.forEach(x=>{
let o=document.createElement("option");
o.value=x.deviceId;
o.text=x.label||x.kind;
if(x.kind==="videoinput")cameraSelect.appendChild(o);
if(x.kind==="audioinput")micSelect.appendChild(o);
});
});
</script>

</body>
</html>
