<!DOCTYPE html>
<html>
<head>
<title>ZUNO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#0d2b45;color:white;overflow:hidden;}
#login{text-align:center;margin-top:80px;}
#login h1{color:red;font-size:50px;}
input{padding:12px;width:260px;margin:10px;border-radius:5px;border:none;background:#3e558c;color:white;}
button{padding:10px 15px;border:none;border-radius:5px;background:#ffd800;cursor:pointer;}
#app{display:none;height:100vh;flex-direction:column;}
.top{display:flex;justify-content:space-between;padding:10px;background:#2e2e80;}
.coin{background:gold;color:black;padding:5px 15px;border-radius:20px;}
#main{display:flex;height:calc(100vh - 60px);}
#videoSide{width:60%;display:flex;flex-direction:column;align-items:center;gap:20px;}
.videoBox{width:280px;height:280px;background:black;border-radius:10px;}
video{width:100%;height:100%;object-fit:cover;}
#chatSide{width:40%;background:#ddd;color:black;display:flex;flex-direction:column;}
#chat{flex:1;padding:10px;}
.chatInput{display:flex;}
.chatInput input{flex:1;padding:10px;}
.sendBtn{background:red;color:white;}
</style>
</head>

<body>

<div id="login">
<h1>ZUNO</h1>
<input id="name" placeholder="NAME"><br>
<input id="age" placeholder="AGE"><br>
<button onclick="login()">ENTER</button>
</div>

<div id="app">
<div class="top">
<div>COINS: <span id="coins">100</span></div>
</div>

<div id="main">

<div id="videoSide">
<video id="me" autoplay muted></video>
<video id="stranger" autoplay></video>

<div>
<button onclick="start()">START</button>
<button onclick="next()">NEXT</button>
<button onclick="end()">END</button>
</div>
</div>

<div id="chatSide">
<div id="chat"></div>
<div class="chatInput">
<input id="msg">
<button class="sendBtn" onclick="send()">SEND</button>
</div>
</div>

</div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
let socket;
let localStream;
let peer;

/* LOGIN */
function login(){
let age=document.getElementById("age").value;
if(age<18){alert("18+ only");return;}

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="flex";

/* 🔥 YOUR BACKEND */
socket = io("https://zuno-app-1.onrender.com");

setup();
}

/* START CAMERA */
async function start(){
localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
me.srcObject = localStream;
socket.emit("start");
}

/* NEXT */
function next(){
if(peer) peer.close();
socket.emit("next");
}

/* END */
function end(){
if(peer) peer.close();
socket.emit("end");
}

/* CHAT */
function send(){
let msg=document.getElementById("msg").value;
socket.emit("message",msg);
addMsg("You: "+msg);
}

function addMsg(t){
let d=document.createElement("div");
d.innerText=t;
chat.appendChild(d);
}

/* WEBRTC */
function createPeer(init){
peer=new RTCPeerConnection({
iceServers:[
{urls:"stun:stun.l.google.com:19302"}
]
});

localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));

peer.ontrack=e=>stranger.srcObject=e.streams[0];

peer.onicecandidate=e=>{
if(e.candidate){
socket.emit("candidate",e.candidate);
}
};

if(init){
peer.createOffer().then(o=>{
peer.setLocalDescription(o);
socket.emit("offer",o);
});
}
}

/* SOCKET */
function setup(){

socket.on("matched",()=>{
createPeer(true);
});

socket.on("offer",async o=>{
createPeer(false);
await peer.setRemoteDescription(o);
let ans=await peer.createAnswer();
await peer.setLocalDescription(ans);
socket.emit("answer",ans);
});

socket.on("answer",async a=>{
await peer.setRemoteDescription(a);
});

socket.on("candidate",async c=>{
if(peer) await peer.addIceCandidate(c);
});

socket.on("end",()=>{
if(peer) peer.close();
stranger.srcObject=null;
});

socket.on("message",(m)=>{
addMsg("Stranger: "+m);
});

}
</script>

</body>
</html>
