<!DOCTYPE html>
<html>
<head>
<title>ZUNO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#0f2027,#203a43);
  color:white;
  overflow:hidden;
}

/* LOGIN */
#login{
  text-align:center;
  margin-top:120px;
}

#login h1{
  font-size:40px;
}

input{
  padding:12px;
  width:260px;
  margin:8px;
  border-radius:10px;
  border:none;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#111;
}

.left, .right{
  display:flex;
  gap:10px;
}

.coin{
  background:gold;
  color:black;
  padding:6px 18px;
  border-radius:20px;
  font-weight:bold;
}

/* 💎 PREMIUM BADGE */
.premiumBadge{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:gold;
  color:black;
  padding:5px 12px;
  border-radius:15px;
  font-size:14px;
  display:none;
}

/* MAIN */
#app{
  display:none;
  height:100vh;
  flex-direction:column;
}

#main{
  flex:1;
  display:flex;
  height:calc(100vh - 60px);
}

/* VIDEO SIDE */
#videoSide{
  width:60%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

/* CAMERA */
.videoBox{
  width:min(38vh, 380px);
  height:min(38vh, 380px);
  background:black;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
  position:relative;
}

.videoBox video{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.3s;
}

/* 🔥 BLUR EFFECT */
.blur{
  filter:blur(8px);
}

/* 🔥 CAMERA BUTTONS */
.camOverlay{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
}

.camBtn{
  background:rgba(0,0,0,0.6);
  border-radius:50%;
  padding:10px;
  cursor:pointer;
  font-size:18px;
}

/* 🔴 MIC OFF */
.off{
  background:red !important;
}

/* CHAT SIDE */
#chatSide{
  width:40%;
  display:flex;
  flex-direction:column;
  background:#111;
}

#chat{
  flex:1;
  padding:10px;
  overflow:auto;
}

.chatInput{
  padding:10px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:cyan;
  cursor:pointer;
}

.controls{
  text-align:center;
}

.modal{
  display:none;
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  border-radius:10px;
}

.closeBtn{
  position:absolute;
  top:5px;
  right:10px;
  cursor:pointer;
  color:red;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="login">
<h1>⚡ ZUNO ⚡</h1>
<input id="name"><br>
<input id="age" type="number"><br>
<button onclick="login()">Enter</button>
</div>

<div id="app">

<!-- 💎 BADGE -->
<div class="premiumBadge" id="premiumBadge">💎 PREMIUM</div>

<div class="top">
<button onclick="watchAd()">Ads</button>
<div class="coin">🪙 <span id="coins">0</span></div>
<div>
<button onclick="openPremium()">Premium</button>
<button onclick="openReport()">Report</button>
<button onclick="loadHistory()">History</button>
</div>
</div>

<div id="main">

<div id="videoSide">

<div class="videoBox">
<video id="me" autoplay muted></video>

<div class="camOverlay">
<div id="camBtn" class="camBtn" onclick="toggleCam()">🎥</div>
<div id="micBtn" class="camBtn" onclick="toggleMic()">🎤</div>
</div>

</div>

<div class="videoBox">
<video id="stranger" autoplay></video>
</div>

<div class="controls">
<button onclick="start()">Start</button>
<button onclick="next()">Next (-2)</button>
<button onclick="end()">End</button>

<br><br>

<select id="gender" onchange="checkPremium(this)">
<option value="all">All</option>
<option value="boys">Boys (Premium)</option>
<option value="girls">Girls (Premium)</option>
</select>

</div>

</div>

<div id="chatSide">
<div id="chat"></div>

<div class="chatInput">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

<script>
let stream;
let isPremium = false;

/* START */
async function start(){
  stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  me.srcObject = stream;
}

/* END */
function end(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    me.srcObject=null;
    stream=null;
  }
}

/* CAMERA TOGGLE */
function toggleCam(){
  if(!stream) return;
  let t = stream.getVideoTracks()[0];
  t.enabled = !t.enabled;

  if(!t.enabled){
    me.classList.add("blur");
  }else{
    me.classList.remove("blur");
  }
}

/* MIC TOGGLE */
function toggleMic(){
  if(!stream) return;
  let t = stream.getAudioTracks()[0];
  t.enabled = !t.enabled;

  let btn = document.getElementById("micBtn");
  if(!t.enabled){
    btn.classList.add("off");
  }else{
    btn.classList.remove("off");
  }
}

/* PREMIUM */
function checkPremium(select){
  if(!isPremium && select.value !== "all"){
    alert("Premium required");
    select.value="all";
  }
}

/* DEMO PREMIUM */
function openPremium(){
  isPremium=true;
  document.getElementById("premiumBadge").style.display="block";
  alert("Premium Activated");
}
</script>

</body>
</html>
