<!DOCTYPE html>
<html>
<head>
<title>ZUNO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#0f2027,#203a43);
  color:white;
  overflow:hidden; /* 🔥 prevent scroll */
}

/* LOGIN */
#login{
  text-align:center;
  margin-top:120px;
}

#login h1{
  font-size:40px;
}

input{
  padding:12px;
  width:260px;
  margin:8px;
  border-radius:10px;
  border:none;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#111;
}

.left, .right{
  display:flex;
  gap:10px;
}

.coin{
  background:gold;
  color:black;
  padding:6px 18px;
  border-radius:20px;
  font-weight:bold;
}

/* MAIN */
#app{
  display:none;
  height:100vh;
  flex-direction:column;
}

#main{
  flex:1;
  display:flex;
  height:calc(100vh - 60px);
}

/* VIDEO SIDE */
#videoSide{
  width:60%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

/* 🔥 PERFECT CAMERA FIX */
.videoBox{
  width:min(38vh, 380px);   /* responsive size */
  height:min(38vh, 380px);
  background:black;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
}

.videoBox video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CHAT SIDE */
#chatSide{
  width:40%;
  display:flex;
  flex-direction:column;
  background:#111;
}

#chat{
  flex:1;
  padding:10px;
  overflow:auto;
}

.chatInput{
  padding:10px;
}

/* BUTTON */
button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:cyan;
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}

.controls{
  text-align:center;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  border-radius:10px;
}

/* MOBILE */
@media(max-width:768px){
  #main{
    flex-direction:column;
  }
  #videoSide, #chatSide{
    width:100%;
  }

  .videoBox{
    width:80vw;
    height:80vw;
  }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h1>⚡ ZUNO ⚡</h1>
<input id="name" placeholder="Name"><br>
<input id="age" type="number" placeholder="Age"><br>
<button onclick="login()">Enter</button><br>
<button onclick="openTerms()">Terms & Policy</button>
</div>

<!-- TERMS -->
<div id="terms" class="modal">
<h3>Terms & Policy</h3>
<p>18+ only. No abuse. No nudity. Respect others.</p>
<button onclick="closeTerms()">Close</button>
</div>

<!-- MAIN APP -->
<div id="app">

<div class="top">

<div class="left">
<button onclick="watchAd()">Ads</button>
</div>

<div class="coin">🪙 <span id="coins">0</span></div>

<div class="right">
<button onclick="openPremium()">Premium</button>
<button onclick="openReport()">Report</button>
<button onclick="loadHistory()">History</button>
</div>

</div>

<div id="main">

<!-- VIDEO -->
<div id="videoSide">

<div class="videoBox">
<video id="me" autoplay muted></video>
</div>

<div class="videoBox">
<video id="stranger" autoplay></video>
</div>

<div class="controls">
<button onclick="start()">Start</button>
<button onclick="next()">Next (-2)</button>
<button onclick="end()">End</button>
</div>

</div>

<!-- CHAT -->
<div id="chatSide">

<div id="chat"></div>

<div class="chatInput">
<input id="msg">
<button onclick="send()">Send</button>
</div>

</div>

</div>

</div>

<!-- PREMIUM -->
<div id="premiumBox" class="modal">
<h3>Premium</h3>
<button onclick="buy(200,2)">Platinum (2h)</button>
<button onclick="buy(500,10)">Gold (10h)</button>
<button onclick="buy(1000,24)">Diamond (24h)</button>
</div>

<!-- REPORT -->
<div id="reportBox" class="modal">
<h3>Report</h3>
<button onclick="ban()">Nudity</button>
<button onclick="ban()">Violence</button>
<button onclick="ban()">Abuse</button>
</div>

<!-- HISTORY -->
<div id="historyBox" class="modal">
<h3>History</h3>
<ul id="historyList"></ul>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
