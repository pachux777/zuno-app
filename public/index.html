<!DOCTYPE html>
<html>
<head>
<title>Zuno</title>

<style>
body{
  background:linear-gradient(45deg,#000,#001f2f);
  color:white;
  text-align:center;
  font-family:Arial;
}

/* floating emoji background */
body::before{
  content:"🔥 💬 🎥 💎 🪙 🚀 😎";
  position:fixed;
  font-size:40px;
  opacity:0.05;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.left{
  display:flex;
  gap:5px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:cyan;
  cursor:pointer;
  transition:0.2s;
}

/* click animation */
button:active{
  transform:scale(0.9);
}

#premiumBtn{
  background:gold;
}

#videoBox{
  display:flex;
  justify-content:center;
  gap:20px;
}

video{
  width:320px;
  height:240px;
  background:black;
  border-radius:10px;
}

#chatBox{
  height:120px;
  overflow:auto;
  border:1px solid gray;
  width:60%;
  margin:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<h1>ZUNO</h1>
<input id="username" placeholder="Name"><br>
<input id="age" type="number" placeholder="Age"><br>
<button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="topbar">
  <div class="left">
    <button onclick="coins()">🪙</button>
    <button onclick="showHistory()">💬</button>
  </div>

  <div>
    <button id="premiumBtn">💎</button>
    <button onclick="reportUser()">🚨</button>
  </div>
</div>

<h2 id="status">Ready</h2>

<div id="videoBox">
  <div>
    <h3>YOU</h3>
    <video id="localVideo" autoplay muted></video>
  </div>

  <div>
    <h3>STRANGER</h3>
    <video id="remoteVideo" autoplay></video>
  </div>
</div>

<br>

<button onclick="startChat()">Start</button>
<button onclick="nextUser()">Next</button>
<button onclick="endChat()">End</button>

<br><br>

<input id="msgInput">
<button onclick="sendMsg()">Send</button>

<div id="chatBox"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
