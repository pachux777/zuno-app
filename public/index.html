<!DOCTYPE html>
<html>
<head>
<title>Zuno</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f2027;
  color:white;
  text-align:center;
}

/* LOGIN */
#login{
  margin-top:120px;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

.coin{
  background:gold;
  color:black;
  padding:5px 15px;
  border-radius:20px;
}

/* VIDEO */
#videos{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

video{
  width:45%;
  height:250px;
  background:black;
  border-radius:10px;
}

/* BUTTON */
button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:cyan;
  margin:5px;
  cursor:pointer;
}

input{
  padding:10px;
  border-radius:10px;
  border:none;
  width:60%;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>ZUNO</h2>
<input id="age" type="number" placeholder="Age"><br>
<button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="top">
<button onclick="watchAd()">Ads</button>
<div class="coin">🪙 <span id="coins">0</span></div>
<button onclick="report()">Report</button>
</div>

<div id="videos">
<video id="me" autoplay muted></video>
<video id="stranger" autoplay></video>
</div>

<button onclick="start()">Start</button>
<button onclick="next()">Next</button>
<button onclick="end()">End</button>

<br>
<input id="msg">
<button onclick="send()">Send</button>

<div id="chat"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
