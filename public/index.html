<!DOCTYPE html>
<html>
<head>
<title>Zuno</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  background:linear-gradient(135deg,#000,#0f2027,#203a43);
  color:white;
  font-family:Arial;
  text-align:center;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

.left button, .right button{
  margin:3px;
}

.coin{
  background:gold;
  color:black;
  padding:6px 15px;
  border-radius:20px;
}

/* VIDEO */
#videos{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:10px;
}

video{
  width:440px;
  height:300px;
  border-radius:10px;
  background:black;
}

/* BUTTON */
button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:cyan;
  cursor:pointer;
}

#loading{
  display:none;
}

/* PREMIUM POPUP */
#premiumBox{
  display:none;
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:20px;
  border-radius:15px;
}

</style>
</head>

<body>

<div class="top">
<div class="left">
<button onclick="watchAd()">🎬 Ads</button>
<button onclick="openPremium()">💎</button>
</div>

<div class="coin">🪙 <span id="coins">0</span></div>

<div class="right">
<button onclick="historyShow()">🕘</button>
<button onclick="report()">🚨</button>
</div>
</div>

<div id="loading">🔄 Finding your mate...</div>

<div id="videos">
<video id="me" autoplay muted></video>
<video id="stranger" autoplay></video>
</div>

<button onclick="start()">Start</button>
<button onclick="next()">Next</button>
<button onclick="end()">End</button>

<input id="msg">
<button onclick="send()">Send</button>

<div id="chat"></div>

<!-- PREMIUM -->
<div id="premiumBox">
<h3>💎 Premium</h3>
<button onclick="buy(200,7200)">Platinum (2h)</button><br>
<button onclick="buy(500,36000)">Gold (10h)</button><br>
<button onclick="buy(1000,86400)">Diamond (24h)</button><br>
<button onclick="closePremium()">Close</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
