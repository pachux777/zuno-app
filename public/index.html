<!DOCTYPE html>
<html>
<head>
<title>ZUNO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#0f2027,#203a43);
  color:white;
}

/* ===== LOGIN ===== */
#login{
  text-align:center;
  margin-top:120px;
}

#login h1{
  font-size:40px;
}

input{
  padding:12px;
  width:260px;
  margin:8px;
  border-radius:10px;
  border:none;
}

/* ===== TOP BAR ===== */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#111;
}

.left, .right{
  display:flex;
  gap:10px;
}

.coin{
  background:gold;
  color:black;
  padding:6px 18px;
  border-radius:20px;
  font-weight:bold;
}

/* ===== MAIN ===== */
#app{
  display:none;
  height:100vh;
  display:flex;
  flex-direction:column;
}

#main{
  flex:1;
  display:flex;
}

/* ===== VIDEO SIDE ===== */
#videoSide{
  width:60%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:15px;
}

/* 🔥 SQUARE CAMERA FIX */
.videoBox{
  width:300px;
  height:300px;
  background:black;
  border-radius:15px;
  overflow:hidden;
}

.videoBox video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== CHAT SIDE ===== */
#chatSide{
  width:40%;
  display:flex;
  flex-direction:column;
  background:#111;
}

#chat{
  flex:1;
  padding:10px;
  overflow:auto;
}

/* ===== BUTTON ===== */
button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:cyan;
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}

.controls{
  text-align:center;
}

/* ===== POPUP ===== */
.popup{
  display:none;
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:20px;
  border-radius:10px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  #main{
    flex-direction:column;
  }
  #videoSide, #chatSide{
    width:100%;
  }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h1>⚡ ZUNO ⚡</h1>
<input id="name" placeholder="Enter Name"><br>
<input id="age" type="number" placeholder="Enter Age"><br>
<button onclick="login()">Enter</button><br>
<button onclick="openPolicy()">Policy</button>
</div>

<!-- APP -->
<div id="app">

<!-- TOP -->
<div class="top">

<div class="left">
<button onclick="watchAd()">🎬 Ads</button>
<button onclick="openPolicy()">📜 Policy</button>
</div>

<div class="coin">🪙 <span id="coins">0</span></div>

<div class="right">
<button onclick="openReport()">🚨 Report</button>
</div>

</div>

<!-- MAIN -->
<div id="main">

<!-- LEFT VIDEO -->
<div id="videoSide">

<div class="videoBox">
<video id="me" autoplay muted></video>
</div>

<div class="videoBox">
<video id="stranger" autoplay></video>
</div>

<div class="controls">
<button onclick="start()">Start</button>
<button onclick="next()">Next (-2)</button>
<button onclick="end()">End</button>
</div>

</div>

<!-- RIGHT CHAT -->
<div id="chatSide">

<div id="chat"></div>

<div style="padding:10px;">
<input id="msg">
<button onclick="send()">Send</button>
</div>

</div>

</div>

</div>

<!-- REPORT -->
<div id="reportBox" class="popup">
<h3>Report User</h3>
<button onclick="reportAction('Nude')">Nude</button>
<button onclick="reportAction('Abuse')">Abuse</button>
<button onclick="reportAction('Violence')">Violence</button>
<button onclick="closeReport()">Close</button>
</div>

<!-- POLICY -->
<div id="policyBox" class="popup">
<h3>Policy</h3>
<p>18+ only</p>
<p>No nudity</p>
<p>No abuse</p>
<p>No violence</p>
<button onclick="closePolicy()">Close</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
