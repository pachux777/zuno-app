<!DOCTYPE html>
<html>
<head>
<title>Zuno</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

/* MEME BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
  font-size: 50px;
  opacity: 0.1;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
  align-items: center;
}

/* TITLE */
h2 {
  color: #0ff;
  text-shadow: 0 0 20px #0ff;
}

/* SPLIT */
.video-container {
  display: flex;
  width: 90%;
  height: 380px;
  margin: auto;
  margin-top: 20px;
  gap: 10px;
}

.video-box {
  flex: 1;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 30px #0ff;
  background: black;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* BUTTON */
button {
  margin: 10px;
  padding: 12px 25px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(45deg, cyan, blue);
  color: white;
  font-weight: bold;
}

/* CHAT */
#chat {
  width: 80%;
  margin: 20px auto;
  height: 150px;
  overflow-y: auto;
  background: #111;
  border-radius: 10px;
  padding: 10px;
}

input {
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="bg">
  😂 😎 😍 😢 😡 🤯 👻 🤖 😂 😎 😍 😢 😡 🤯 👻 🤖
</div>

<h2>⚡ Zuno ⚡</h2>

<select id="gender">
  <option value="any">Any</option>
  <option value="male">Male</option>
  <option value="female">Female</option>
</select>

<div class="video-container">
  <div class="video-box">
    <video id="me" autoplay muted></video>
  </div>

  <div class="video-box">
    <video id="stranger" autoplay></video>
  </div>
</div>

<button onclick="startChat()">Start</button>
<button onclick="nextUser()">Next</button>
<button onclick="endChat()">End</button>

<div id="chat"></div>

<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
