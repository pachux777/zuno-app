<!DOCTYPE html>
<html>
<head>
  <title>Zuno</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background:#0a0a0a;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    h1 { color:cyan; }

    .topbar {
      display:flex;
      justify-content:space-between;
      padding:10px;
    }

    .left {
      display:flex;
      gap:5px;
    }

    video {
      width:45%;
      border-radius:15px;
      background:black;
    }

    button {
      padding:10px;
      border-radius:10px;
      border:none;
      background:linear-gradient(45deg,cyan,blue);
      color:white;
    }

    input {
      padding:10px;
      margin:5px;
      border-radius:8px;
      border:none;
    }

    #chatBox {
      height:120px;
      overflow:auto;
      border:1px solid gray;
      margin-top:10px;
    }

    .big video {
      width:90% !important;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h1>ZUNO</h1>
  <input id="username" placeholder="Enter name"><br>
  <input id="age" type="number" placeholder="Enter age"><br><br>
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="topbar">
  <div class="left">
    <button onclick="coins()">🪙</button>
    <button onclick="toggleTheatre()">🎬</button>
    <button onclick="showHistory()">😊</button>
  </div>

  <button onclick="reportUser()">🚨</button>
</div>

<h1>ZUNO</h1>
<h3 id="status">Ready</h3>

<div id="videoBox">
  <div>
    <h4>YOU</h4>
    <video id="localVideo" autoplay muted></video>
  </div>

  <div>
    <h4>STRANGER</h4>
    <video id="remoteVideo" autoplay></video>
  </div>
</div>

<br>

<button onclick="startChat()">Start</button>
<button onclick="nextUser()">Next</button>
<button onclick="endChat()">End</button>

<br><br>

<input id="msgInput" placeholder="Message">
<button onclick="sendMsg()">Send</button>

<div id="chatBox"></div>

</div>

<!-- ADS -->
<script src="https://pl29131156.profitablecpmratenetwork.com/8d/99/98/8d99989f643f0ceb74dababf43137ed4.js"></script>

<script src="/socket.io/socket.io.js"></script>

<script>
let socket;
let peer;
let localStream;
let history=[];

// LOGIN
function login(){
  let name=username.value;
  let age=document.getElementById("age").value;

  if(!name || !age) return alert("Fill all");
  if(age<18) return alert("18+ only");

  loginPage.style.display="none";
  app.style.display="block";

  socket=io();
  socket.emit("set-name",name);

  setupSocket();
}

// CAMERA
async function startCamera(){
  localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  localVideo.srcObject=localStream;
}

// START
function startChat(){
  startCamera();
  socket.emit("start");
  status.innerText="Searching...";
}

// SOCKET
function setupSocket(){

  socket.on("matched",()=>{
    status.innerText="Connected 🔥";
    createPeer();
  });

  socket.on("signal",async(data)=>{
    if(!peer) createPeer();

    if(data.sdp){
      await peer.setRemoteDescription(new RTCSessionDescription(data.sdp));
      if(data.sdp.type==="offer"){
        let ans=await peer.createAnswer();
        await peer.setLocalDescription(ans);
        socket.emit("signal",{sdp:peer.localDescription});
      }
    }

    if(data.candidate){
      await peer.addIceCandidate(new RTCIceCandidate(data.candidate));
    }
  });

  socket.on("message",(data)=>{
    addMessage(data.name+": "+data.text);
  });

  socket.on("partner-disconnected",()=>{
    status.innerText="Searching...";
    if(peer) peer.close();
    remoteVideo.srcObject=null;
  });
}

// WEBRTC
function createPeer(){
  peer=new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));

  peer.ontrack=e=>remoteVideo.srcObject=e.streams[0];

  peer.onicecandidate=e=>{
    if(e.candidate) socket.emit("signal",{candidate:e.candidate});
  };

  peer.createOffer().then(o=>{
    peer.setLocalDescription(o);
    socket.emit("signal",{sdp:o});
  });
}

// CHAT
function sendMsg(){
  let msg=msgInput.value;
  socket.emit("message",msg);
  addMessage("You: "+msg);
  msgInput.value="";
}

// ADD MESSAGE
function addMessage(msg){
  let d=document.createElement("div");
  d.innerText=msg;
  chatBox.appendChild(d);
  history.push(msg);
}

// HISTORY
function showHistory(){
  alert(history.join("\n")||"No history");
}

// COINS
function coins(){
  alert("Ads running — coins coming soon");
}

// REPORT
function reportUser(){
  alert("User reported 🚨");
}

// THEATRE
function toggleTheatre(){
  videoBox.classList.toggle("big");
}

// NEXT
function nextUser(){
  if(peer) peer.close();
  socket.emit("next");
}

// END FIXED
function endChat(){
  if(peer){ peer.close(); peer=null; }
  if(socket){ socket.disconnect(); socket=null; }
  remoteVideo.srcObject=null;
  status.innerText="Ended";
}
</script>

</body>
</html>
