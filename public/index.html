<!DOCTYPE html>
<html>
<head>
<title>ZUNO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#0f2027,#203a43);
  color:white;
  overflow:hidden;
}

#login{text-align:center;margin-top:100px;}

input{
  padding:12px;
  width:250px;
  margin:10px;
  border-radius:10px;
  border:none;
}

#app{display:none;height:100vh;flex-direction:column;}

.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

.coin{
  background:gold;
  color:black;
  padding:5px 15px;
  border-radius:20px;
}

#main{display:flex;flex:1;}

#videoSide{
  width:65%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

.videoBox{
  width:320px;
  height:320px;
  background:black;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.deviceUI{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.7);
  padding:10px;
  border-radius:10px;
}

#chatSide{
  width:35%;
  background:#111;
  display:flex;
  flex-direction:column;
}

#statusText{padding:10px;color:yellow;}
#chat{flex:1;padding:10px;}

.chatInput{display:flex;padding:10px;}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:cyan;
  margin:5px;
}

.modal{
  display:none;
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="login">
<h1>ZUNO</h1>
<input id="name" placeholder="Name"><br>
<input id="age" type="number" placeholder="Age"><br>
<button onclick="login()">Enter</button><br>
<button onclick="openTerms()">Terms</button>
</div>

<div id="termsModal" class="modal">
<p>18+ only</p>
<button onclick="closeTerms()">Close</button>
</div>

<div id="app">

<div class="top">
<button onclick="watchAd()">Ads</button>
<div class="coin">🪙 <span id="coins">20</span></div>
<div>
<button onclick="openPremium()">Premium</button>
<button onclick="openReport()">Report</button>
<button onclick="openHistory()">History</button>
</div>
</div>

<div id="main">

<div id="videoSide">

<div class="videoBox">
<video id="me" autoplay muted playsinline></video>

<div id="deviceUI" class="deviceUI">
<button onclick="flipCamera()">Flip</button><br>
<select id="cameraSelect"></select><br>
<select id="micSelect"></select>
</div>

</div>

<div class="videoBox">
<video id="stranger" autoplay playsinline></video>
</div>

<div>
<button onclick="start()">Start</button>
<button onclick="next()">Next</button>
<button onclick="end()">End</button>
</div>

</div>

<div id="chatSide">
<div id="statusText">Ready</div>
<div id="chat"></div>

<div class="chatInput">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

</div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
let stream;
let socket;
let facing="user";

/* LOGIN */
function login(){
let age=document.getElementById("age").value;
if(age<18){alert("18+ only");return;}

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="flex";

document.getElementById("coins").innerText=200;

/* 🔥 FIX SOCKET INIT */
socket = io("https://zuno-app.onrender.com");
}

/* 🔥 SAFE START */
async function start(){

if(!socket){
alert("Not connected yet");
return;
}

showStatus("Connecting...");

try{
stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:facing,width:{ideal:640},height:{ideal:480}},
audio:true
});

me.srcObject=stream;
deviceUI.style.display="none";

socket.emit("start");

}catch(e){
alert("Camera error");
}
}

/* END */
function end(){

showStatus("Ended");

if(stream){
stream.getTracks().forEach(t=>t.stop());
stream=null;
me.srcObject=null;
}

deviceUI.style.display="block";
stranger.srcObject=null;

if(socket) socket.emit("end");
}

/* NEXT */
function next(){
end();
setTimeout(start,500);
}

/* FLIP */
function flipCamera(){
facing=facing==="user"?"environment":"user";
end();
setTimeout(start,300);
}

/* STATUS */
function showStatus(t){
statusText.innerText=t;
}

/* UI FUNCTIONS */
function openTerms(){termsModal.style.display="block";}
function closeTerms(){termsModal.style.display="none";}
function openPremium(){alert("Premium");}
function openReport(){alert("Report");}
function openHistory(){alert("History");}
function watchAd(){
setTimeout(()=>{
coins.innerText=parseInt(coins.innerText)+20;
},1000);
}

/* CHAT */
function send(){
if(!msg.value)return;
let d=document.createElement("div");
d.innerText="You: "+msg.value;
chat.appendChild(d);
msg.value="";
}

/* DEVICES */
navigator.mediaDevices.enumerateDevices().then(d=>{
d.forEach(x=>{
let o=document.createElement("option");
o.value=x.deviceId;
o.text=x.label||x.kind;
if(x.kind==="videoinput")cameraSelect.appendChild(o);
if(x.kind==="audioinput")micSelect.appendChild(o);
});
});
</script>

</body>
</html>
