<!DOCTYPE html>
<html>
<head>
  <title>Zuno 🔥</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    video {
      width: 45%;
      margin: 5px;
      border-radius: 10px;
      background: black;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #00c6ff;
      color: white;
      font-weight: bold;
    }

    input {
      padding: 8px;
      margin: 5px;
    }

    #chatBox {
      height: 150px;
      overflow-y: auto;
      border: 1px solid gray;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <h2>Enter your name</h2>
  <input id="username" placeholder="Your name" />
  <br><br>
  <button onclick="login()">Start Chat</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

  <h1>⚡ Zuno ⚡</h1>
  <h3 id="status">Ready</h3>

  <video id="localVideo" autoplay muted></video>
  <video id="remoteVideo" autoplay></video>

  <br>

  <button onclick="startChat()">Start</button>
  <button onclick="nextUser()">Next</button>
  <button onclick="endChat()">End</button>

  <br><br>

  <input id="msgInput" placeholder="Type message..." />
  <button onclick="sendMsg()">Send</button>

  <div id="chatBox"></div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
let socket;
let localStream;
let peer;

// 🔐 LOGIN
function login() {
  const name = document.getElementById("username").value;

  if (!name) {
    alert("Enter your name!");
    return;
  }

  document.getElementById("loginPage").style.display = "none";
  document.getElementById("app").style.display = "block";

  socket = io();
  socket.emit("set-name", name);

  setupSocket();
}

// 🎥 CAMERA
async function startCamera() {
  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  document.getElementById("localVideo").srcObject = localStream;
}

// ▶ START CHAT
function startChat() {
  startCamera();
  socket.emit("start");
  document.getElementById("status").innerText = "Searching...";
}

// 🔌 SOCKET EVENTS
function setupSocket() {

  socket.on("matched", () => {
    document.getElementById("status").innerText = "Connected 🔥";
    createPeer();
  });

  socket.on("signal", async (data) => {
    if (!peer) createPeer();

    if (data.sdp) {
      await peer.setRemoteDescription(new RTCSessionDescription(data.sdp));

      if (data.sdp.type === "offer") {
        const answer = await peer.createAnswer();
        await peer.setLocalDescription(answer);
        socket.emit("signal", { sdp: peer.localDescription });
      }
    }

    if (data.candidate) {
      await peer.addIceCandidate(new RTCIceCandidate(data.candidate));
    }
  });

  socket.on("message", (data) => {
    addMessage(data.name + ": " + data.text);
  });

  socket.on("typing", () => {
    document.getElementById("status").innerText = "Typing...";
  });

  socket.on("partner-disconnected", () => {
    document.getElementById("status").innerText = "Searching...";
    if (peer) peer.close();
    document.getElementById("remoteVideo").srcObject = null;
  });
}

// 🔗 WEBRTC
function createPeer() {
  peer = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  });

  localStream.getTracks().forEach(track => {
    peer.addTrack(track, localStream);
  });

  peer.ontrack = (e) => {
    document.getElementById("remoteVideo").srcObject = e.streams[0];
  };

  peer.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit("signal", { candidate: e.candidate });
    }
  };

  peer.createOffer().then(offer => {
    peer.setLocalDescription(offer);
    socket.emit("signal", { sdp: offer });
  });
}

// 💬 SEND MESSAGE
function sendMsg() {
  const input = document.getElementById("msgInput");

  socket.emit("message", input.value);
  addMessage("You: " + input.value);

  input.value = "";
}

// 💬 ADD MESSAGE
function addMessage(msg) {
  const div = document.createElement("div");
  div.innerText = msg;
  document.getElementById("chatBox").appendChild(div);
}

// ⌨ TYPING
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("msgInput").addEventListener("input", () => {
    if (socket) socket.emit("typing");
  });
});

// ⏭ NEXT USER
function nextUser() {
  if (peer) peer.close();
  socket.emit("next");
  document.getElementById("remoteVideo").srcObject = null;
}

// ❌ END CHAT
function endChat() {
  if (peer) peer.close();
  if (socket) socket.disconnect();
  document.getElementById("remoteVideo").srcObject = null;
}
</script>

</body>
</html>
