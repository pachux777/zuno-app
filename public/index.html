<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZUNO</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0d2238;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      background: #1e3a5c;
      color: white;
    }

    button {
      padding: 12px;
      margin: 10px 5px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .enter {
      background: #e83333;
      color: white;
      width: 100%;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h1 style="color:#ff3b3b;">ZUNO</h1>

  <input id="name" placeholder="Your Name">
  <input id="age" placeholder="Your Age">

  <div>
    <button onclick="setGender('boy')">Boy</button>
    <button onclick="setGender('girl')">Girl</button>
    <button onclick="setGender('other')">Other</button>
  </div>

  <button class="enter" onclick="enter()">ENTER</button>
</div>

<script src="script.js"></script>

</body>
</html>
