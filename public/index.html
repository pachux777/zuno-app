<!DOCTYPE html>
<html>
<head>
<title>Zuno</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:white;
  font-family:Arial;
  text-align:center;
}

/* LOGIN */
#loginPage{
  margin-top:100px;
}

/* INPUT */
input{
  padding:10px;
  margin:8px;
  border-radius:8px;
  border:none;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

/* BUTTON */
button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:cyan;
  cursor:pointer;
}

.gold{background:gold;color:black;}
.blue{background:cyan;color:black;}
.pink{background:magenta;color:white;}

/* VIDEO */
#videoBox{
  display:flex;
  justify-content:center;
  gap:20px;
}

video{
  width:320px;
  height:240px;
  background:black;
  border-radius:10px;
}

/* PREMIUM */
#premiumUI{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#111;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.card{
  padding:20px;
  margin:10px;
  border-radius:15px;
  width:80%;
}

/* MOBILE ONLY */
@media(max-width:768px){

  #loginPage{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }

  input{
    width:80%;
    padding:15px;
    font-size:18px;
  }

  button{
    width:80%;
    font-size:18px;
    padding:15px;
  }

  video{
    width:48%;
    height:300px;
  }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<h1>ZUNO</h1>
<input id="name" placeholder="Name"><br>
<input id="age" type="number" placeholder="Age"><br>
<button onclick="login()">ENTER</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="topbar">
<div>🪙 <span id="coins">0</span> | ⏱ <span id="premiumTime">0</span></div>
<button onclick="watchAd()">+20</button>
<button onclick="openPremium()">💎</button>
</div>

<div id="videoBox">
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

<button onclick="startChat()">Start</button>
<button onclick="nextUser()">Next</button>
<button onclick="endChat()">End</button>

<input id="msg">
<button onclick="sendMsg()">Send</button>

<div id="chatBox"></div>

</div>

<!-- PREMIUM -->
<div id="premiumUI">

<h2>💎 PREMIUM SHOP</h2>

<div class="card gold">
<h3>2 HOURS</h3>
<button onclick="buy(100,2)">BUY (100)</button>
</div>

<div class="card blue">
<h3>10 HOURS</h3>
<button onclick="buy(500,10)">BUY (500)</button>
</div>

<div class="card pink">
<h3>24 HOURS</h3>
<button onclick="buy(1000,24)">BUY (1000)</button>
</div>

<button onclick="closePremium()">CLOSE</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
