<!DOCTYPE html>
<html>
<head>
  <title>ZUNO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    /* LOGIN */
    #login {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    input {
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: none;
      width: 200px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: cyan;
      font-weight: bold;
      cursor: pointer;
    }

    /* APP */
    #app {
      display: none;
    }

    #topBar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: rgba(0,0,0,0.6);
    }

    .coinBox {
      background: gold;
      color: black;
      padding: 5px 12px;
      border-radius: 10px;
      font-weight: bold;
    }

    /* VIDEO */
    #videoContainer {
      width: 90%;
      height: 55vh;
      margin: 10px auto;
      background: black;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
    }

    #remoteVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #localVideo {
      position: absolute;
      width: 110px;
      height: 150px;
      bottom: 10px;
      right: 10px;
      border: 2px solid white;
      border-radius: 10px;
    }

    /* CONTROLS */
    #controls {
      display: flex;
      justify-content: space-around;
      padding: 10px;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>🔥 Welcome to ZUNO</h2>
  <input id="name" placeholder="Enter Name">
  <input id="age" type="number" placeholder="Enter Age">
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app">

  <div id="topBar">
    <div class="coinBox">🪙 <span id="coins">50</span></div>
    <button onclick="watchAd()">🎁 Watch Ad</button>
  </div>

  <div id="videoContainer">
    <video id="remoteVideo" autoplay></video>
    <video id="localVideo" autoplay muted></video>
  </div>

  <div id="controls">
    <button onclick="startChat()">Start</button>
    <button onclick="nextChat()">Next</button>
    <button onclick="endChat()">End</button>
  </div>

</div>

<script>
let coins = 50;
let adRunning = false;

function login() {
  let name = document.getElementById("name").value;
  let age = document.getElementById("age").value;

  if (!name || !age) {
    alert("Enter name and age");
    return;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function updateCoins() {
  document.getElementById("coins").innerText = coins;
}

function watchAd() {
  if (adRunning) return;

  adRunning = true;
  alert("Watching ad...");

  setTimeout(() => {
    coins += 10;
    updateCoins();
    alert("Ad finished +10 coins");
    adRunning = false;
  }, 4000);
}

function startChat() {
  if (coins < 5) {
    alert("Not enough coins");
    return;
  }

  coins -= 5;
  updateCoins();
  alert("Chat started (connect WebRTC here)");
}

function nextChat() {
  alert("Next user");
}

function endChat() {
  alert("Chat ended");
}

/* CAMERA (so video not black) */
navigator.mediaDevices.getUserMedia({ video: true, audio: true })
.then(stream => {
  document.getElementById("localVideo").srcObject = stream;
})
.catch(err => {
  console.log("Camera error:", err);
});
</script>

</body>
</html>
