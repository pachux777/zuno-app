<!DOCTYPE html>
<html>
<head>
<title>ZUNO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#0d2b45;
color:white;
overflow:hidden;
}

#login{text-align:center;margin-top:80px;}

#login h1{
color:red;
font-size:50px;
}

input{
padding:12px;
width:260px;
margin:10px;
border-radius:5px;
border:none;
background:#3e558c;
color:white;
}

button{
padding:10px 15px;
border:none;
border-radius:5px;
background:#ffd800;
cursor:pointer;
}

.rulesBtn{
margin-top:15px;
background:#3e558c;
color:white;
}

.footerBtns{
margin-top:40px;
display:flex;
justify-content:space-around;
}

.footerBtns button{
background:#3e558c;
color:white;
}

#app{display:none;height:100vh;flex-direction:column;}

.top{
display:flex;
justify-content:space-between;
padding:10px;
background:#2e2e80;
}

.coin{
background:gold;
color:black;
padding:5px 15px;
border-radius:20px;
}

#main{display:flex;height:calc(100vh - 60px);}

#videoSide{
width:60%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:20px;
}

.videoBox{
width:280px;
height:280px;
background:black;
border-radius:10px;
position:relative;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.deviceUI{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
text-align:center;
}

#chatSide{
width:40%;
background:#ddd;
color:black;
display:flex;
flex-direction:column;
}

#chat{flex:1;padding:10px;}

.chatInput{display:flex;}

.chatInput input{
flex:1;
padding:10px;
}

.sendBtn{
background:red;
color:white;
}

/* POPUPS */
.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#eee;
color:black;
padding:20px;
border-radius:10px;
z-index:200;
width:250px;
text-align:center;
}

.popup h3{
background:yellow;
padding:5px;
}

.popup button{
display:block;
margin:10px auto;
background:#3e558c;
color:white;
width:100%;
}

/* 🔥 GENDER */
.genderBox{
margin-top:10px;
text-align:center;
}
.genderBox button{
background:#3e558c;
color:white;
margin:3px;

/* ADDED */
transition:0.3s;
}

/* ACTIVE EFFECT */
.genderBox button.active{
background:#00ffcc !important;
color:black;
transform:scale(1.1);
box-shadow:0 0 10px #00ffcc;
}
</style>
</head>

<body>

<div id="login">
<h1>ZUNO</h1>

<input id="name" placeholder="NAME" oninput="this.value=this.value.replace(/[^a-zA-Z ]/g,'')"><br>
<input id="age" placeholder="AGE" oninput="this.value=this.value.replace(/[^0-9]/g,'')"><br>

<button onclick="login()">ENTER</button>

<br>
<button class="rulesBtn" onclick="openRules()">RULES</button>

<div class="footerBtns">
<button onclick="openTerms()">TERMS</button>
<button onclick="openPolicy()">POLICY</button>
<button onclick="openPrivacy()">PRIVACY</button>
<button onclick="openAge()">AGE</button>
</div>
</div>

<!-- POPUPS -->
<div id="rulesModal" class="popup">
<h3>RULES</h3>
<p>18+ only<br>No nudity<br>No abuse<br>Be respectful</p>
<button onclick="closeRules()">Close</button>
</div>

<div id="historyPopup" class="popup">
<h3>HISTORY</h3>
<div id="historyBox"></div>
<button onclick="closeHistory()">Close</button>
</div>

<div id="reportPopup" class="popup">
<h3>REPORT</h3>
<button onclick="report('Abuse')">ABUSE</button>
<button onclick="report('Nudity')">NUDITY</button>
<button onclick="report('Violence')">VIOLENCE</button>
<button onclick="closeReport()">Close</button>
</div>

<div id="premiumPopup" class="popup">
<h3>PREMIUM</h3>
<button onclick="buy(200,2)">PLATINUM 200</button>
<button onclick="buy(500,10)">GOLD 500</button>
<button onclick="buy(1000,24)">DIAMOND 1000</button>
<button onclick="closePremium()">Close</button>
</div>

<div id="app">

<div class="top">
<button onclick="watchAd()">ADS</button>
<div class="coin">COINS: <span id="coins">20</span></div>
<div>
<button onclick="openPremium()">PREMIUM</button>
<button onclick="openHistory()">HISTORY</button>
<button onclick="openReport()">REPORT</button>
</div>
</div>

<div id="main">

<div id="videoSide">

<div class="videoBox">
<video id="me" autoplay muted></video>
<div id="deviceUI" class="deviceUI">
<button onclick="flipCamera()">Flip Camera</button><br>
<select id="cameraSelect"></select><br>
<select id="micSelect"></select>
</div>
</div>

<div class="videoBox">
<video id="stranger" autoplay></video>
</div>

<div>
<button onclick="start()">Start</button>
<button onclick="next()">Next</button>
<button onclick="end()">End</button>
</div>

<!-- GENDER -->
<div class="genderBox">
<button onclick="setGender('all')" id="allBtn">ALL</button>
<button id="boyBtn" onclick="setGender('boy')">BOY 🔒</button>
<button id="girlBtn" onclick="setGender('girl')">GIRL 🔒</button>
</div>

</div>

<div id="chatSide">
<div id="chat"></div>
<div class="chatInput">
<input id="msg" placeholder="TYPE">
<button class="sendBtn" onclick="send()">SEND</button>
</div>
</div>

</div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
let stream;
let socket=null;
let history=[];
let premium=false;
let selectedGender="all";

/* 🔥 FIXED + ANIMATION */
function setGender(g){

if((g==="boy" || g==="girl") && !premium){
alert("Buy premium");
return;
}

selectedGender=g;

/* animation */
document.querySelectorAll(".genderBox button").forEach(btn=>{
btn.classList.remove("active");
});

if(g==="all") document.getElementById("allBtn").classList.add("active");
if(g==="boy") document.getElementById("boyBtn").classList.add("active");
if(g==="girl") document.getElementById("girlBtn").classList.add("active");

}

/* LOGIN */
function login(){
let name=document.getElementById("name").value.trim();
let age=parseInt(document.getElementById("age").value);

if(!name || isNaN(age)){alert("Fill all");return;}
if(age<18){alert("18+ only");return;}

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="flex";

document.getElementById("coins").innerText=200;

if(typeof io!=="undefined"){
socket=io("https://zuno-app.onrender.com");
}
}

/* PREMIUM */
function buy(cost,h){
if(parseInt(coins.innerText)<cost){alert("No coins");return;}

coins.innerText=parseInt(coins.innerText)-cost;
premium=true;

document.getElementById("boyBtn").innerText="BOY";
document.getElementById("girlBtn").innerText="GIRL";

alert("Premium unlocked");
}

/* REST SAME */
function openHistory(){historyPopup.style.display="block";historyBox.innerHTML=history.join("<br>");}
function closeHistory(){historyPopup.style.display="none";}
function openReport(){reportPopup.style.display="block";}
function closeReport(){reportPopup.style.display="none";}
function openPremium(){premiumPopup.style.display="block";}
function closePremium(){premiumPopup.style.display="none";}

async function start(){
if(!stream){
stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
me.srcObject=stream;
deviceUI.style.display="none";
}
if(socket) socket.emit("start",{gender:selectedGender});
}

function next(){
if(socket) socket.emit("next",{gender:selectedGender});
}

function end(){
if(stream){
stream.getTracks().forEach(t=>t.stop());
stream=null;
me.srcObject=null;
}
deviceUI.style.display="block";
if(socket) socket.emit("end");
}

function watchAd(){
window.open("https://www.profitableratecpm.com/");
setTimeout(()=>{coins.innerText=parseInt(coins.innerText)+20;},3000);
}

function send(){
if(!msg.value)return;
let text="You: "+msg.value;
history.push(text);
let d=document.createElement("div");
d.innerText=text;
chat.appendChild(d);
msg.value="";
}

function openRules(){rulesModal.style.display="block";}
function closeRules(){rulesModal.style.display="none";}
function openTerms(){alert("Terms");}
function openPolicy(){alert("Policy");}
function openPrivacy(){alert("Privacy");}
function openAge(){alert("18+ only");}

navigator.mediaDevices.enumerateDevices().then(d=>{
d.forEach(x=>{
let o=document.createElement("option");
o.value=x.deviceId;
o.text=x.label||x.kind;
if(x.kind==="videoinput")cameraSelect.appendChild(o);
if(x.kind==="audioinput")micSelect.appendChild(o);
});
});
</script>

</body>
</html>
