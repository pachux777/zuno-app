<!DOCTYPE html>
<html>
<head>
<title>ZUNO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#0f2027,#203a43);
  color:white;
  overflow:hidden;
}

/* LOGIN */
#login{
  text-align:center;
  margin-top:120px;
}

#login h1{
  font-size:40px;
}

input{
  padding:12px;
  width:260px;
  margin:8px;
  border-radius:10px;
  border:none;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#111;
}

.coin{
  background:gold;
  color:black;
  padding:6px 18px;
  border-radius:20px;
  font-weight:bold;
}

/* PREMIUM */
.premiumBadge{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:gold;
  color:black;
  padding:5px 12px;
  border-radius:15px;
  display:none;
}

/* MAIN */
#app{
  display:none;
  height:100vh;
  flex-direction:column;
}

#main{
  flex:1;
  display:flex;
}

/* VIDEO */
#videoSide{
  width:65%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

.videoBox{
  width:min(38vh,380px);
  height:min(38vh,380px);
  background:black;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  box-shadow:0 0 25px rgba(0,255,255,0.5);
}

.videoBox video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* KEEP BUT HIDE */
.camOverlay{
  display:none !important;
}

/* CENTER DEVICE UI */
.deviceUI{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:10px;
  text-align:center;
  z-index:5;
}

.blur{ filter:blur(8px); }

/* CHAT */
#chatSide{
  width:35%;
  background:#111;
  display:flex;
  flex-direction:column;
}

#chat{
  flex:1;
  padding:10px;
  overflow:auto;
}

.chatInput{
  padding:10px;
  display:flex;
  gap:10px;
}

.chatInput input{ flex:1; }

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:cyan;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  border-radius:10px;
}
.closeBtn{
  position:absolute;
  right:10px;
  top:5px;
  color:red;
}
</style>
</head>

<body>

<div id="login">
<h1>⚡ ZUNO ⚡</h1>
<input id="name" placeholder="Enter Name"><br>
<input id="age" type="number" placeholder="Enter Age"><br>
<button onclick="login()">Enter</button><br>
<button onclick="openTerms()">Terms</button>
</div>

<div class="modal" id="termsModal">
<span class="closeBtn" onclick="closeTerms()">X</span>
<p>18+ only. No abuse or nudity.</p>
</div>

<div class="modal" id="reportModal">
<span class="closeBtn" onclick="closeReport()">X</span>
<button onclick="report('Abuse')">Abuse</button>
<button onclick="report('Nude')">Nude</button>
<button onclick="report('Violence')">Violence</button>
</div>

<div id="app">

<div class="premiumBadge" id="premiumBadge">💎 PREMIUM</div>

<div class="top">
<button onclick="watchAd()">Ads</button>
<div class="coin">🪙 <span id="coins">20</span></div>
<div>
<button onclick="openPremium()">Premium</button>
<button onclick="openReport()">Report</button>
<button onclick="loadHistory()">History</button>
</div>
</div>

<div id="main">

<div id="videoSide">

<div class="videoBox">

<div class="deviceUI" id="deviceUI">
<select id="cameraSelect"></select><br>
<select id="micSelect"></select>
</div>

<video id="me" autoplay muted></video>

<div class="camOverlay">
<div onclick="toggleCam()">🎥</div>
<div onclick="toggleMic()">🎤</div>
</div>

</div>

<div class="videoBox">
<video id="stranger"></video>
</div>

<div class="controls">
<button onclick="start()">Start</button>
<button onclick="next()">Next (-2)</button>
<button onclick="end()">End</button>
</div>

</div>

<div id="chatSide">
<div style="padding:10px;">⚠ 18+ only</div>
<div id="chat"></div>
<div class="chatInput">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

</div>
</div>

<script>
let stream;

/* LOGIN FIXED */
function login(){
let name=document.getElementById("name").value;
let age=document.getElementById("age").value;

if(!name || !age){
alert("Fill all fields");
return;
}

if(age<18){
alert("18+ only");
return;
}

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="flex";
}

/* DEVICES */
async function loadDevices(){
let d=await navigator.mediaDevices.enumerateDevices();
cameraSelect.innerHTML="";
micSelect.innerHTML="";
d.forEach(x=>{
let o=document.createElement("option");
o.value=x.deviceId;
o.text=x.label||x.kind;
if(x.kind==="videoinput")cameraSelect.appendChild(o);
if(x.kind==="audioinput")micSelect.appendChild(o);
});
}

/* START */
async function start(){
let c=parseInt(coins.innerText);
if(c<=0){
alert("No coins! watch ads");
return;
}

stream=await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});
me.srcObject=stream;

/* hide UI */
deviceUI.style.display="none";
}

/* END */
function end(){
if(stream){
stream.getTracks().forEach(t=>t.stop());
me.srcObject=null;
stream=null;
}

/* show UI */
deviceUI.style.display="block";
}

/* NEXT */
function next(){
let c=parseInt(coins.innerText);
if(c<2){
alert("Not enough coins");
return;
}
coins.innerText=c-2;
end();
setTimeout(start,500);
}

/* ADS */
function watchAd(){
coins.innerText=parseInt(coins.innerText)+20;
alert("+20 coins added");
}

/* CHAT */
function send(){
if(!msg.value)return;
let d=document.createElement("div");
d.innerText="You: "+msg.value;
chat.appendChild(d);
msg.value="";
}

/* HISTORY */
function loadHistory(){
let w=window.open("");
w.document.write(chat.innerHTML);
}

/* TERMS */
function openTerms(){termsModal.style.display="block";}
function closeTerms(){termsModal.style.display="none";}

/* REPORT */
function openReport(){reportModal.style.display="block";}
function closeReport(){reportModal.style.display="none";}
function report(t){alert(t);}

window.onload=loadDevices;
</script>

</body>
</html>
