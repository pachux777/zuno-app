<!DOCTYPE html>
<html>
<head>
<title>ZUNO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* SAME YOUR STYLE (NO CHANGE) */
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#0f2027,#203a43);
  color:white;
  overflow:hidden;
}

#login{
  text-align:center;
  margin-top:120px;
}

#login h1{font-size:40px;}

input{
  padding:12px;
  width:260px;
  margin:8px;
  border-radius:10px;
  border:none;
}

.top{display:flex;justify-content:space-between;padding:10px;background:#111;}
.coin{background:gold;color:black;padding:6px 18px;border-radius:20px;}

#app{display:none;height:100vh;flex-direction:column;}
#main{flex:1;display:flex;}

#videoSide{width:60%;display:flex;flex-direction:column;align-items:center;gap:20px;}

.videoBox{
  width:min(38vh,380px);
  height:min(38vh,380px);
  background:black;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

video{width:100%;height:100%;object-fit:cover;}

.camOverlay{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
}

.camBtn{
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:50%;
}

#chatSide{width:40%;background:#111;display:flex;flex-direction:column;}
#chat{flex:1;padding:10px;overflow:auto;}

.modal{
  display:none;
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h1>⚡ ZUNO ⚡</h1>
<input id="name" placeholder="Enter Name"><br>
<input id="age" type="number" placeholder="Enter Age"><br>
<button onclick="login()">Enter</button><br>
<button onclick="openTerms()">Terms & Conditions</button>
</div>

<!-- TERMS -->
<div id="termsBox" class="modal">
<h3>Terms & Conditions</h3>
<p>18+ only. No nudity. No abuse. Respect all users.</p>
<button onclick="closeTerms()">Close</button>
</div>

<!-- REPORT -->
<div id="reportBox" class="modal">
<h3>Report</h3>
<p>User reported</p>
<button onclick="closeReport()">Close</button>
</div>

<!-- HISTORY -->
<div id="historyBox" class="modal">
<h3>History</h3>
<ul id="historyList"></ul>
<button onclick="closeHistory()">Close</button>
</div>

<!-- PREMIUM -->
<div id="premiumBox" class="modal">
<h3>Premium Activated 💎</h3>
<button onclick="closePremium()">Close</button>
</div>

<!-- MAIN -->
<div id="app">

<div class="top">
<button onclick="watchAd()">Ads</button>
<div class="coin">🪙 <span id="coins">100</span></div>
<div>
<button onclick="openPremium()">Premium</button>
<button onclick="openReport()">Report</button>
<button onclick="loadHistory()">History</button>
</div>
</div>

<div id="main">

<div id="videoSide">

<div class="videoBox">
<video id="me" autoplay muted></video>

<div class="camOverlay">
<div class="camBtn" onclick="toggleCam()">🎥</div>
<div class="camBtn" onclick="toggleMic()">🎤</div>
</div>
</div>

<div class="videoBox">
<video id="stranger"></video>
</div>

<button onclick="start()">Start</button>
<button onclick="next()">Next</button>
<button onclick="end()">End</button>

</div>

<div id="chatSide">
<div id="chat"></div>
<input id="msg">
<button onclick="send()">Send</button>
</div>

</div>
</div>

<script>
let stream;
let coins = 100;

/* LOGIN */
function login(){
  let name = nameInput();
  let age = ageInput();

  if(!name || !age){
    alert("Fill all fields");
    return;
  }

  if(age < 18){
    alert("You must be 18+");
    return;
  }

  loginBox().style.display="none";
  appBox().style.display="flex";
}

function nameInput(){return document.getElementById("name").value;}
function ageInput(){return document.getElementById("age").value;}
function loginBox(){return document.getElementById("login");}
function appBox(){return document.getElementById("app");}

/* TERMS */
function openTerms(){termsBox.style.display="block";}
function closeTerms(){termsBox.style.display="none";}

/* ADS */
function watchAd(){
  coins+=20;
  updateCoins();
}

/* COINS */
function updateCoins(){
  document.getElementById("coins").innerText = coins;
}

/* PREMIUM */
function openPremium(){premiumBox.style.display="block";}
function closePremium(){premiumBox.style.display="none";}

/* REPORT */
function openReport(){reportBox.style.display="block";}
function closeReport(){reportBox.style.display="none";}

/* HISTORY */
function loadHistory(){
  historyBox.style.display="block";
  historyList.innerHTML="<li>Previous User</li>";
}
function closeHistory(){historyBox.style.display="none";}

/* CAMERA */
async function start(){
  stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  me.srcObject = stream;
}

function end(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    me.srcObject=null;
  }
}

/* TOGGLE */
function toggleCam(){
  if(!stream) return;
  let t = stream.getVideoTracks()[0];
  t.enabled=!t.enabled;
}

function toggleMic(){
  if(!stream) return;
  let t = stream.getAudioTracks()[0];
  t.enabled=!t.enabled;
}

/* CHAT */
function send(){
  let text = msg.value;
  if(!text) return;

  let d=document.createElement("div");
  d.innerText="You: "+text;
  chat.appendChild(d);

  msg.value="";
}

/* NEXT */
function next(){
  if(coins < 2){
    alert("Need coins");
    return;
  }
  coins -= 2;
  updateCoins();
}
</script>

</body>
</html>
