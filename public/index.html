<!DOCTYPE html>
<html>
<head>
<title>ZUNO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* 🔥 YOUR FULL CSS SAME (NO CHANGE) */
body{margin:0;font-family:Arial;background:#0d2b45;color:white;overflow:hidden;}
#login{text-align:center;margin-top:80px;}
#login h1{color:red;font-size:50px;}
input{padding:12px;width:260px;margin:10px;border-radius:5px;border:none;background:#3e558c;color:white;}
button{padding:10px 15px;border:none;border-radius:5px;background:#ffd800;cursor:pointer;}
.rulesBtn{margin-top:15px;background:#3e558c;color:white;}
.footerBtns{margin-top:40px;display:flex;justify-content:space-around;}
.footerBtns button{background:#3e558c;color:white;}
#app{display:none;height:100vh;flex-direction:column;}
.top{display:flex;justify-content:space-between;padding:10px;background:#2e2e80;}
.coin{background:gold;color:black;padding:5px 15px;border-radius:20px;}
#main{display:flex;height:calc(100vh - 60px);}
#videoSide{width:60%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.videoBox{width:280px;height:280px;background:black;border-radius:10px;position:relative;}
video{width:100%;height:100%;object-fit:cover;}
.deviceUI{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.6);padding:10px;border-radius:10px;text-align:center;}
#chatSide{width:40%;background:#ddd;color:black;display:flex;flex-direction:column;}
#chat{flex:1;padding:10px;}
.chatInput{display:flex;}
.chatInput input{flex:1;padding:10px;}
.sendBtn{background:red;color:white;}
.popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#eee;color:black;padding:20px;border-radius:10px;z-index:200;width:250px;text-align:center;}
.popup h3{background:yellow;padding:5px;}
.popup button{display:block;margin:10px auto;background:#3e558c;color:white;width:100%;}
.genderBox{margin-top:10px;text-align:center;}
.genderBox button{background:#3e558c;color:white;margin:3px;transition:0.3s;}
.genderBox button.active{background:#00ffcc!important;color:black;transform:scale(1.1);box-shadow:0 0 10px #00ffcc;}
</style>
</head>

<body>

<!-- 🔥 YOUR FULL HTML SAME (NO CHANGE) -->

<script src="/socket.io/socket.io.js"></script>

<script>
let stream;
let socket=null;
let history=[];
let premium=false;
let selectedGender="all";

/* 🔥 WEBRTC ADD START */
let pc=null;
const config={iceServers:[{urls:"stun:stun.l.google.com:19302"}]};

function createPeer(){
pc=new RTCPeerConnection(config);

pc.onicecandidate=e=>{
if(e.candidate){
socket.emit("candidate",e.candidate);
}
};

pc.ontrack=e=>{
document.getElementById("stranger").srcObject=e.streams[0];
};

if(stream){
stream.getTracks().forEach(track=>{
pc.addTrack(track,stream);
});
}
}
/* 🔥 WEBRTC ADD END */

/* 🔥 ORIGINAL FUNCTIONS SAME */
function setGender(g){
if((g==="boy"||g==="girl")&&!premium){alert("Buy premium");return;}
selectedGender=g;
document.querySelectorAll(".genderBox button").forEach(btn=>btn.classList.remove("active"));
if(g==="all") document.getElementById("allBtn").classList.add("active");
if(g==="boy") document.getElementById("boyBtn").classList.add("active");
if(g==="girl") document.getElementById("girlBtn").classList.add("active");
}

/* LOGIN */
function login(){
let name=document.getElementById("name").value.trim();
let age=parseInt(document.getElementById("age").value);

if(!name||isNaN(age)){alert("Fill all");return;}
if(age<18){alert("18+ only");return;}

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="flex";
document.getElementById("coins").innerText=200;

if(typeof io!=="undefined"){
socket=io("https://zuno-app.onrender.com");

/* 🔥 WEBRTC SOCKET */
socket.on("offer",async data=>{
createPeer();
await pc.setRemoteDescription(data);
let ans=await pc.createAnswer();
await pc.setLocalDescription(ans);
socket.emit("answer",ans);
});

socket.on("answer",async data=>{
if(pc) await pc.setRemoteDescription(data);
});

socket.on("candidate",async data=>{
if(pc) await pc.addIceCandidate(data);
});
}
}

/* START */
async function start(){
if(!stream){
stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
me.srcObject=stream;
deviceUI.style.display="none";
}

/* 🔥 ADD */
createPeer();
let offer=await pc.createOffer();
await pc.setLocalDescription(offer);
socket.emit("offer",offer);
/* 🔥 ADD END */

if(socket) socket.emit("start",{gender:selectedGender});
}

/* NEXT */
function next(){
if(socket) socket.emit("next",{gender:selectedGender});
}

/* END */
function end(){

/* 🔥 ADD */
if(pc){
pc.close();
pc=null;
}
document.getElementById("stranger").srcObject=null;
/* 🔥 ADD END */

if(stream){
stream.getTracks().forEach(t=>t.stop());
stream=null;
me.srcObject=null;
}

deviceUI.style.display="block";
if(socket) socket.emit("end");
}

/* REST SAME */
function buy(cost,h){
if(parseInt(coins.innerText)<cost){alert("No coins");return;}
coins.innerText=parseInt(coins.innerText)-cost;
premium=true;
document.getElementById("boyBtn").innerText="BOY";
document.getElementById("girlBtn").innerText="GIRL";
alert("Premium unlocked");
}

function openHistory(){historyPopup.style.display="block";historyBox.innerHTML=history.join("<br>");}
function closeHistory(){historyPopup.style.display="none";}
function openReport(){reportPopup.style.display="block";}
function closeReport(){reportPopup.style.display="none";}
function openPremium(){premiumPopup.style.display="block";}
function closePremium(){premiumPopup.style.display="none";}

function watchAd(){
window.open("https://www.profitableratecpm.com/");
setTimeout(()=>{coins.innerText=parseInt(coins.innerText)+20;},3000);
}

function send(){
if(!msg.value)return;
let text="You: "+msg.value;
history.push(text);
let d=document.createElement("div");
d.innerText=text;
chat.appendChild(d);
msg.value="";
}

function openRules(){rulesModal.style.display="block";}
function closeRules(){rulesModal.style.display="none";}
function openTerms(){alert("Terms");}
function openPolicy(){alert("Policy");}
function openPrivacy(){alert("Privacy");}
function openAge(){alert("18+ only");}

navigator.mediaDevices.enumerateDevices().then(d=>{
d.forEach(x=>{
let o=document.createElement("option");
o.value=x.deviceId;
o.text=x.label||x.kind;
if(x.kind==="videoinput")cameraSelect.appendChild(o);
if(x.kind==="audioinput")micSelect.appendChild(o);
});
});
</script>

</body>
</html>
