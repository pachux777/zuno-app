<!DOCTYPE html>
<html>
<head>
  <title>ZUNO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #2c5364);
      color: white;
      overflow: hidden;
    }

    #topBar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: rgba(0,0,0,0.6);
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 10;
    }

    .coinBox {
      background: gold;
      color: black;
      padding: 6px 12px;
      border-radius: 10px;
      font-weight: bold;
    }

    .btn {
      background: cyan;
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    #videoContainer {
      position: absolute;
      top: 50px;
      width: 100%;
      height: calc(100vh - 150px);
      background: black;
    }

    #remoteVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #localVideo {
      position: absolute;
      width: 120px;
      height: 160px;
      bottom: 10px;
      right: 10px;
      border: 2px solid white;
      border-radius: 10px;
    }

    #controls {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      padding: 10px;
      background: rgba(0,0,0,0.7);
    }

    input {
      padding: 6px;
      border-radius: 6px;
      border: none;
    }

  </style>
</head>

<body>

<!-- TOP BAR -->
<div id="topBar">
  <div class="coinBox">🪙 <span id="coins">100</span></div>
  <button class="btn" onclick="watchAd()">🎁 Watch Ad</button>
</div>

<!-- VIDEO -->
<div id="videoContainer">
  <video id="remoteVideo" autoplay></video>
  <video id="localVideo" autoplay muted></video>
</div>

<!-- CONTROLS -->
<div id="controls">
  <button class="btn" onclick="startChat()">Start</button>
  <button class="btn" onclick="nextChat()">Next</button>
  <button class="btn" onclick="endChat()">End</button>
  <input id="msg" placeholder="Message">
  <button class="btn" onclick="sendMsg()">Send</button>
</div>

<script>
let coins = 100;
let adRunning = false;

function updateCoins() {
  document.getElementById("coins").innerText = coins;
}

function watchAd() {
  if (adRunning) return;

  adRunning = true;
  alert("Ad started... wait 5 seconds");

  setTimeout(() => {
    coins += 10;
    updateCoins();
    alert("Ad finished! +10 coins");
    adRunning = false;
  }, 5000); // 5 sec fake ad
}

function startChat() {
  if (coins < 5) {
    alert("Not enough coins!");
    return;
  }
  coins -= 5;
  updateCoins();
  console.log("Start WebRTC here");
}

function nextChat() {
  console.log("Next user");
}

function endChat() {
  console.log("End chat");
}

function sendMsg() {
  let msg = document.getElementById("msg").value;
  console.log("Send:", msg);
}
</script>

</body>
</html>
