<!DOCTYPE html>
<html>
<head>
<title>ZUNO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* ===== YOUR FULL ORIGINAL STYLE (UNCHANGED) ===== */
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#0f2027,#203a43);
  color:white;
  overflow:hidden;
}

#login{text-align:center;margin-top:120px;}
#login h1{font-size:40px;}

input{
  padding:12px;
  width:260px;
  margin:8px;
  border-radius:10px;
  border:none;
}

.top{display:flex;justify-content:space-between;align-items:center;padding:10px;background:#111;}
.left,.right{display:flex;gap:10px;}
.coin{background:gold;color:black;padding:6px 18px;border-radius:20px;font-weight:bold;}

.premiumBadge{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:gold;
  color:black;
  padding:5px 12px;
  border-radius:15px;
  display:none;
}

#app{display:none;height:100vh;flex-direction:column;}
#main{flex:1;display:flex;height:calc(100vh - 60px);}

#videoSide{width:60%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}

.videoBox{
  width:min(38vh,380px);
  height:min(38vh,380px);
  background:black;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

.videoBox video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.blur{filter:blur(8px);}

.camOverlay{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
}

.camBtn{
  background:rgba(0,0,0,0.6);
  border-radius:50%;
  padding:10px;
  cursor:pointer;
}

.off{background:red !important;}

#chatSide{width:40%;display:flex;flex-direction:column;background:#111;}
#chat{flex:1;padding:10px;overflow:auto;}
.chatInput{padding:10px;}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:cyan;
}

.controls{text-align:center;}

.modal{
  display:none;
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h1>⚡ ZUNO ⚡</h1>
<input id="name" placeholder="Enter Name"><br>
<input id="age" type="number" placeholder="Enter Age"><br>
<button onclick="login()">Enter</button>
</div>

<!-- REPORT -->
<div id="reportBox" class="modal">
<h3>Report</h3>
<button onclick="closeReport()">Close</button>
</div>

<!-- HISTORY -->
<div id="historyBox" class="modal">
<h3>History</h3>
<ul id="historyList"></ul>
<button onclick="closeHistory()">Close</button>
</div>

<div id="app">

<div class="premiumBadge" id="premiumBadge">💎 PREMIUM</div>

<div class="top">
<button onclick="watchAd()">Ads</button>
<div class="coin">🪙 <span id="coins">0</span></div>
<div>
<button onclick="openPremium()">Premium</button>
<button onclick="openReport()">Report</button>
<button onclick="loadHistory()">History</button>
</div>
</div>

<div id="main">

<div id="videoSide">

<div class="videoBox">
<video id="me" autoplay muted></video>

<div class="camOverlay">
<div id="camBtn" class="camBtn" onclick="toggleCam()">🎥</div>
<div id="micBtn" class="camBtn" onclick="toggleMic()">🎤</div>
</div>
</div>

<div class="videoBox">
<video id="stranger" autoplay></video>
</div>

<div class="controls">
<button onclick="start()">Start</button>
<button onclick="next()">Next (-2)</button>
<button onclick="end()">End</button>
</div>

</div>

<div id="chatSide">
<div id="chat"></div>

<div class="chatInput">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

</div>
</div>

<script>
let stream;
let coins = 100;

/* LOGIN */
function login(){
  let name = nameInput();
  let age = ageInput();

  if(!name || !age){
    alert("Fill all fields");
    return;
  }

  if(age < 18){
    alert("18+ only");
    return;
  }

  loginBox().style.display="none";
  appBox().style.display="flex";
}

/* HELPERS */
function nameInput(){return document.getElementById("name").value;}
function ageInput(){return document.getElementById("age").value;}
function loginBox(){return document.getElementById("login");}
function appBox(){return document.getElementById("app");}

/* ADS */
function watchAd(){
  coins += 20;
  updateCoins();
}

/* COINS */
function updateCoins(){
  document.getElementById("coins").innerText = coins;
}

/* REPORT */
function openReport(){reportBox.style.display="block";}
function closeReport(){reportBox.style.display="none";}

/* HISTORY */
function loadHistory(){
  historyBox.style.display="block";
  historyList.innerHTML="<li>User A</li><li>User B</li>";
}
function closeHistory(){historyBox.style.display="none";}

/* CAMERA */
async function start(){
  stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  me.srcObject = stream;
}

function end(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    me.srcObject=null;
  }
}

function toggleCam(){
  if(!stream) return;
  let t = stream.getVideoTracks()[0];
  t.enabled = !t.enabled;
  me.classList.toggle("blur", !t.enabled);
}

function toggleMic(){
  if(!stream) return;
  let t = stream.getAudioTracks()[0];
  t.enabled = !t.enabled;
  micBtn.classList.toggle("off", !t.enabled);
}

/* CHAT */
function send(){
  let m = msg.value;
  if(!m) return;
  let d=document.createElement("div");
  d.innerText="You: "+m;
  chat.appendChild(d);
  msg.value="";
}
