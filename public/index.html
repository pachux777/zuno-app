<!DOCTYPE html>
<html>
<head>
<title>ZUNO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f2027;
  color:white;
}

/* LOGIN */
#login{
  text-align:center;
  margin-top:100px;
}

input{
  padding:12px;
  width:260px;
  margin:5px;
  border-radius:10px;
  border:none;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

.coin{
  background:gold;
  padding:5px 15px;
  border-radius:20px;
  color:black;
}

/* MAIN */
#main{
  display:flex;
  height:80vh;
}

/* VIDEO */
#videoSide{
  width:60%;
  display:flex;
  flex-direction:column;
  gap:10px;
}

video{
  width:100%;
  height:45%;
  background:black;
  border-radius:10px;
}

/* CHAT */
#chatSide{
  width:40%;
  display:flex;
  flex-direction:column;
}

#chat{
  flex:1;
  overflow:auto;
  background:#111;
  padding:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:cyan;
  margin:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h1>⚡ ZUNO ⚡</h1>
<input id="name" placeholder="Name"><br>
<input id="age" type="number" placeholder="Age"><br>
<button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="top">
<button onclick="watchAd()">Ads</button>
<div class="coin">🪙 <span id="coins">0</span></div>
<button onclick="openReport()">Report</button>
</div>

<div id="main">

<div id="videoSide">
<video id="me" autoplay muted></video>
<video id="stranger" autoplay></video>

<button onclick="start()">Start</button>
<button onclick="next()">Next (-2)</button>
<button onclick="end()">End</button>
</div>

<div id="chatSide">
<div id="chat"></div>

<input id="msg">
<button onclick="send()">Send</button>
</div>

</div>

</div>

<!-- REPORT -->
<div id="reportBox" style="display:none; position:fixed; top:30%; left:40%; background:#111; padding:20px;">
<button onclick="reportAction('Nude')">Nude</button>
<button onclick="reportAction('Abuse')">Abuse</button>
<button onclick="reportAction('Violence')">Violence</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
