<!DOCTYPE html>
<html>
<head>
<title>Zuno</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:linear-gradient(135deg,#000,#0f2027,#203a43);
}

/* LOGIN */
#loginPage{
  margin-top:120px;
}

input{
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
  width:200px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:cyan;
  margin:5px;
  cursor:pointer;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

.coin{
  background:gold;
  color:black;
  padding:5px 15px;
  border-radius:20px;
}

/* VIDEO */
#videoBox{
  display:flex;
  justify-content:center;
  gap:15px;
}

video{
  width:420px;
  height:280px;
  border-radius:10px;
  background:black;
}

/* LOADING */
#loading{
  display:none;
  font-size:18px;
  margin:10px;
}

/* MOBILE */
@media(max-width:768px){
  video{width:48%;height:300px;}
}
</style>
</head>

<body>

<div id="loginPage">
<h1>⚡ ZUNO ⚡</h1>
<input id="name" placeholder="Name"><br>
<input id="age" type="number" placeholder="Age"><br>
<button onclick="login()">Enter</button>
</div>

<div id="app" style="display:none;">

<div class="topbar">
<div>
<button onclick="watchAd()">🎬 Ads</button>
<button onclick="openPremium()">💎</button>
</div>

<div class="coin">🪙 <span id="coins">0</span></div>

<div>
<button onclick="showHistory()">🕘</button>
<button onclick="reportUser()">🚨</button>
</div>
</div>

<div id="loading">🔄 Finding your mate...</div>

<div id="videoBox">
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

<button onclick="startChat()">Start</button>
<button onclick="nextUser()">Next</button>
<button onclick="endChat()">End</button>

<input id="msg" oninput="typing()">
<button onclick="sendMsg()">Send</button>

<div id="typing"></div>
<div id="chatBox"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
