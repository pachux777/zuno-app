<!DOCTYPE html>
<html>
<head>
<title>ZUNO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#0f2027,#203a43);
  color:white;
  overflow:hidden;
}

/* LOGIN */
#login{
  text-align:center;
  margin-top:120px;
}

input{
  padding:12px;
  width:260px;
  margin:8px;
  border-radius:10px;
  border:none;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

.coin{
  background:gold;
  color:black;
  padding:6px 18px;
  border-radius:20px;
}

/* MAIN */
#app{display:none;height:100vh;flex-direction:column;}
#main{flex:1;display:flex;}

#videoSide{
  width:65%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

.videoBox{
  width:320px;
  height:320px;
  background:black;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 🔥 CAMERA CONTROL UI LIKE OMEGLE */
.deviceUI{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  padding:10px;
  border-radius:10px;
  text-align:center;
  z-index:5;
}

#chatSide{
  width:35%;
  background:#111;
  display:flex;
  flex-direction:column;
}

#statusText{
  padding:8px;
  color:yellow;
}

#chat{flex:1;padding:10px;}

.chatInput{display:flex;padding:10px;}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:cyan;
}
</style>
</head>

<body>

<div id="login">
<h1>ZUNO</h1>
<input id="name"><br>
<input id="age" type="number"><br>
<button onclick="login()">Enter</button><br>
<button onclick="openTerms()">Terms</button>
</div>

<div id="app">

<div class="top">
<button onclick="watchAd()">Ads</button>
<div class="coin">🪙 <span id="coins">20</span></div>

<div>
<button onclick="openPremium()">Premium</button>
<button onclick="openReport()">Report</button>
<button onclick="loadHistory()">History</button>
</div>
</div>

<div id="main">

<div id="videoSide">

<div class="videoBox">

<video id="me" autoplay muted playsinline></video>

<!-- 🔥 CAMERA CONTROL -->
<div class="deviceUI" id="deviceUI">
<button onclick="flipCamera()">Flip Camera</button><br>
<select id="cameraSelect"></select><br>
<select id="micSelect"></select>
</div>

</div>

<div class="videoBox">
<video id="stranger" autoplay playsinline></video>
</div>

<div>
<button onclick="start()">Start</button>
<button onclick="next()">Next</button>
<button onclick="end()">End</button>
</div>

</div>

<div id="chatSide">
<div id="statusText">Ready</div>
<div id="chat"></div>

<div class="chatInput">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

</div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
let stream;
let socket;
let currentFacing="user";

/* LOGIN */
function login(){
if(age.value<18){alert("18+ only");return;}
login.style.display="none";
app.style.display="flex";
coins.innerText=200;
socket = io("https://zuno-app.onrender.com");
}

/* STATUS */
function showStatus(t){
statusText.innerText=t;
}

/* 🔥 STABLE CAMERA (NO BLINK) */
async function start(){

showStatus("Connecting...");

stream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:currentFacing,
width:{ideal:640},
height:{ideal:480}
},
audio:true
});

me.srcObject = stream;

/* hide UI */
deviceUI.style.display="none";

if(socket) socket.emit("start");
}

/* 🔥 FULL STOP FIX */
function end(){

showStatus("Ended");

if(stream){
stream.getTracks().forEach(track=>track.stop());
stream=null;
me.srcObject=null;
}

/* show UI */
deviceUI.style.display="block";

stranger.srcObject=null;

if(socket) socket.emit("end");
}

/* NEXT */
function next(){
end();
setTimeout(start,500);
}

/* 🔥 CAMERA FLIP */
function flipCamera(){
currentFacing = currentFacing==="user"?"environment":"user";
end();
setTimeout(start,300);
}

/* 🔥 BUTTON FIXES */
function watchAd(){
setTimeout(()=>{
coins.innerText=parseInt(coins.innerText)+20;
},1000);
}

function openPremium(){ alert("Premium"); }
function openReport(){ alert("Report"); }
function loadHistory(){ alert("History"); }

/* CHAT */
function send(){
if(!msg.value)return;
let d=document.createElement("div");
d.innerText="You: "+msg.value;
chat.appendChild(d);
msg.value="";
}

/* DEVICES */
navigator.mediaDevices.enumerateDevices().then(d=>{
d.forEach(x=>{
let o=document.createElement("option");
o.value=x.deviceId;
o.text=x.label||x.kind;
if(x.kind==="videoinput")cameraSelect.appendChild(o);
if(x.kind==="audioinput")micSelect.appendChild(o);
});
});
</script>

</body>
</html>
