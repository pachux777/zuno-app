<!DOCTYPE html>
<html>
<head>
<title>ZUNO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#0f2027,#203a43);
  color:white;
  overflow:hidden;
}

/* LOGIN */
#login{
  text-align:center;
  margin-top:120px;
}

#login h1{
  font-size:40px;
}

input{
  padding:12px;
  width:260px;
  margin:8px;
  border-radius:10px;
  border:none;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#111;
}

.left, .right{
  display:flex;
  gap:10px;
}

.coin{
  background:gold;
  color:black;
  padding:6px 18px;
  border-radius:20px;
  font-weight:bold;
}

/* MAIN */
#app{
  display:none;
  height:100vh;
  flex-direction:column;
}

#main{
  flex:1;
  display:flex;
  height:calc(100vh - 60px);
}

/* VIDEO SIDE */
#videoSide{
  width:60%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

/* CAMERA */
.videoBox{
  width:min(38vh, 380px);
  height:min(38vh, 380px);
  background:black;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
  position:relative; /* 🔥 needed for overlay */
}

.videoBox video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 🔥 INSIDE CAMERA BUTTONS */
.camOverlay{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
}

.camBtn{
  background:rgba(0,0,0,0.6);
  border-radius:50%;
  padding:10px;
  cursor:pointer;
  font-size:18px;
}

/* CHAT SIDE */
#chatSide{
  width:40%;
  display:flex;
  flex-direction:column;
  background:#111;
}

#chat{
  flex:1;
  padding:10px;
  overflow:auto;
}

.chatInput{
  padding:10px;
}

/* BUTTON */
button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:cyan;
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}

.controls{
  text-align:center;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  border-radius:10px;
}

.closeBtn{
  position:absolute;
  top:5px;
  right:10px;
  cursor:pointer;
  color:red;
  font-weight:bold;
}

/* MOBILE */
@media(max-width:768px){
  #main{
    flex-direction:column;
  }
  #videoSide, #chatSide{
    width:100%;
  }

  .videoBox{
    width:80vw;
    height:80vw;
  }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h1>⚡ ZUNO ⚡</h1>
<input id="name" placeholder="Name"><br>
<input id="age" type="number" placeholder="Age"><br>
<button onclick="login()">Enter</button><br>
<button onclick="openTerms()">Terms & Policy</button>
</div>

<!-- TERMS -->
<div id="terms" class="modal">
<span class="closeBtn" onclick="closeTerms()">✖</span>
<h3>Terms & Policy</h3>
<p>18+ only. No abuse. No nudity. Respect others.</p>
</div>

<!-- MAIN -->
<div id="app">

<div class="top">
<div class="left">
<button onclick="watchAd()">Ads</button>
</div>

<div class="coin">🪙 <span id="coins">0</span></div>

<div class="right">
<button onclick="openPremium()">Premium</button>
<button onclick="openReport()">Report</button>
<button onclick="loadHistory()">History</button>
</div>
</div>

<div id="main">

<!-- VIDEO -->
<div id="videoSide">

<!-- YOUR CAMERA -->
<div class="videoBox">
<video id="me" autoplay muted></video>

<!-- 🔥 CAMERA BUTTONS INSIDE -->
<div class="camOverlay">
<div class="camBtn" onclick="toggleCam()">🎥</div>
<div class="camBtn" onclick="toggleMic()">🎤</div>
</div>

</div>

<div class="videoBox">
<video id="stranger" autoplay></video>
</div>

<!-- CONTROLS -->
<div class="controls">
<button onclick="start()">Start</button>
<button onclick="next()">Next (-2)</button>
<button onclick="end()">End</button>

<br><br>

<select id="gender" onchange="checkPremium(this)">
<option value="all">All</option>
<option value="boys">Boys (Premium)</option>
<option value="girls">Girls (Premium)</option>
</select>

</div>

</div>

<!-- CHAT -->
<div id="chatSide">
<div id="chat"></div>

<div class="chatInput">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

<script>
let stream;
let isPremium = false;

/* START */
async function start(){
  stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  me.srcObject = stream;
  socket.emit("start");
}

/* END FIX */
function end(){
  if(stream){
    stream.getTracks().forEach(track=>track.stop());
    me.srcObject=null;
    stream=null;
  }
  socket.emit("end");
}

/* SAFE TOGGLE */
function toggleCam(){
  if(!stream) return;
  let t = stream.getVideoTracks()[0];
  t.enabled = !t.enabled;
}

function toggleMic(){
  if(!stream) return;
  let t = stream.getAudioTracks()[0];
  t.enabled = !t.enabled;
}

/* PREMIUM LOCK */
function checkPremium(select){
  if(!isPremium && select.value !== "all"){
    alert("Premium required");
    select.value="all";
  }
}
</script>

</body>
</html>
