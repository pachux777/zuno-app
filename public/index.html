<!DOCTYPE html>
<html>
<head>
<title>Zuno</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#0f2027,#203a43);
  color:white;
  text-align:center;
}

/* LOGIN */
#login{
  margin-top:120px;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

.coin{
  background:gold;
  color:black;
  padding:5px 15px;
  border-radius:20px;
}

/* VIDEO */
#videos{
  display:flex;
  justify-content:center;
  gap:15px;
}

video{
  width:420px;
  height:280px;
  background:black;
  border-radius:10px;
}

/* BUTTON */
button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:cyan;
  margin:5px;
  cursor:pointer;
}

/* POPUP */
.popup{
  display:none;
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:20px;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>ZUNO</h2>
<input id="name" placeholder="Name"><br>
<input id="age" type="number" placeholder="Age"><br>
<button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="top">
<div>
<button onclick="watchAd()">🎬 Ads</button>
<button onclick="openPremium()">💎</button>
</div>

<div class="coin">🪙 <span id="coins">0</span></div>

<div>
<button onclick="openHistory()">🕘</button>
<button onclick="openReport()">🚨</button>
</div>
</div>

<div id="videos">
<video id="me" autoplay muted></video>
<video id="stranger" autoplay></video>
</div>

<button onclick="start()">Start</button>
<button onclick="next()">Next</button>
<button onclick="end()">End</button>

<input id="msg">
<button onclick="send()">Send</button>

<div id="chat"></div>

</div>

<!-- PREMIUM -->
<div id="premium" class="popup">
<h3>Premium</h3>
<button onclick="buy(200)">Platinum (2h)</button>
<button onclick="buy(500)">Gold (10h)</button>
<button onclick="buy(1000)">Diamond (24h)</button>
<button onclick="closePremium()">Close</button>
</div>

<!-- REPORT -->
<div id="report" class="popup">
<h3>Report User</h3>
<button onclick="submitReport('Nude')">Nude</button>
<button onclick="submitReport('Violence')">Violence</button>
<button onclick="submitReport('Abuse')">Abuse</button>
<button onclick="closeReport()">Close</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
