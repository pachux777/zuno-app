<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZUNO</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0e2a3b;
  color:white;
}

/* LOGIN */
#login{
  text-align:center;
  margin-top:80px;
}

input{
  display:block;
  margin:10px auto;
  padding:12px;
  width:250px;
  background:#2d4a6b;
  border:none;
  color:white;
  border-radius:5px;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.red{background:#ff3b3b;color:white;}
.blue{background:#2d4a6b;color:white;}
.green{background:#28a745;}
.yellow{background:#ffc107;}
.orange{background:#ff9800;}
.gray{background:#6c757d;}

/* APP */
#app{display:none;}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#0b1f2b;
}

.main{
  display:flex;
}

.left{
  width:50%;
  padding:20px;
}

.right{
  width:50%;
  background:#ccc;
  padding:10px;
}

video{
  width:100%;
  height:200px;
  background:black;
  border-radius:10px;
}

.box{
  margin-bottom:15px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  color:black;
  padding:20px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h1 style="color:red;">ZUNO</h1>
  <p>Random video chat with strangers</p>

  <input id="name" placeholder="YOUR NAME">
  <input id="age" placeholder="YOUR AGE (18+)">

  <button class="red" onclick="login()">ENTER</button>

  <br><br>

  <button class="blue" onclick="openModal('rules')">RULES</button><br>
  <button class="blue" onclick="openModal('terms')">TERMS</button>
  <button class="blue" onclick="openModal('policy')">POLICY</button>
  <button class="blue" onclick="openModal('privacy')">PRIVACY</button>
</div>

<!-- APP -->
<div id="app">

<div class="topbar">
  <div>ZUNO</div>
  <div>Coins: <span id="coins">100</span></div>
  <div>
    <button onclick="openPremium()">PREMIUM</button>
    <button onclick="loadHistory()">HISTORY</button>
  </div>
</div>

<div class="main">

<!-- LEFT -->
<div class="left">

<div class="box">
  <video id="me" autoplay muted></video>
</div>

<div class="box">
  <video id="stranger" autoplay></video>
</div>

<div>
  <button class="green" onclick="start()">START</button>
  <button class="yellow" onclick="next()">NEXT (-2)</button>
  <button class="red" onclick="end()">END</button>
  <button class="gray" onclick="openReport()">REPORT</button>
</div>

</div>

<!-- RIGHT -->
<div class="right">
  <div id="chat"></div>
  <input id="msg">
  <button onclick="send()">SEND</button>
</div>

</div>
</div>

<!-- MODALS -->
<div id="rules" class="modal"><div class="modal-content">18+ only<br>No abuse</div></div>
<div id="terms" class="modal"><div class="modal-content">Use responsibly</div></div>
<div id="policy" class="modal"><div class="modal-content">No storing videos</div></div>
<div id="privacy" class="modal"><div class="modal-content">Minimal data used</div></div>
<div id="premiumBox" class="modal"><div class="modal-content">Premium Plans</div></div>
<div id="reportBox" class="modal"><div class="modal-content">Report user</div></div>
<div id="historyBox" class="modal"><div class="modal-content"><ul id="historyList"></ul></div></div>

<script>

let socket;
let coins = 100;

let localStream;
let peer;

function updateCoins(){
  document.getElementById("coins").innerText = coins;
}

function login(){
  let age = document.getElementById("age").value;
  if(age < 18){ alert("18+ only"); return; }

  login.style.display="none";
  app.style.display="block";

  socket = io("https://zuno-app-1.onrender.com");
  setup();
}

function openModal(id){
  document.getElementById(id).style.display="flex";
}

function start(){
  navigator.mediaDevices.getUserMedia({video:true,audio:true})
  .then(stream=>{
    localStream = stream;
    me.srcObject = stream;
    socket.emit("start");
  });
}

function next(){
  if(peer) peer.close();
  socket.emit("next");
}

function end(){
  if(peer) peer.close();
  socket.emit("end");
}

function send(){
  let m = msg.value;
  socket.emit("message", m);
  addMsg("You: "+m);
}

function addMsg(t){
  let d=document.createElement("div");
  d.innerText=t;
  chat.appendChild(d);
}

function createPeer(init){
  peer = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));

  peer.ontrack=e=>{
    stranger.srcObject=e.streams[0];
  };

  peer.onicecandidate=e=>{
    if(e.candidate) socket.emit("candidate", e.candidate);
  };

  if(init){
    peer.createOffer().then(o=>{
      peer.setLocalDescription(o);
      socket.emit("offer", o);
    });
  }
}

function setup(){

  socket.on("matched",()=>createPeer(true));

  socket.on("offer", async o=>{
    createPeer(false);
    await peer.setRemoteDescription(o);
    let ans=await peer.createAnswer();
    await peer.setLocalDescription(ans);
    socket.emit("answer", ans);
  });

  socket.on("answer", async a=>{
    await peer.setRemoteDescription(a);
  });

  socket.on("candidate", async c=>{
    if(peer) await peer.addIceCandidate(c);
  });

  socket.on("end",()=>{
    if(peer) peer.close();
    stranger.srcObject=null;
  });

  socket.on("message",(m)=>addMsg("Stranger: "+m));

  socket.on("history",(list)=>{
    historyList.innerHTML="";
    list.forEach(i=>{
      let li=document.createElement("li");
      li.innerText=i;
      historyList.appendChild(li);
    });
  });
}

function openPremium(){ premiumBox.style.display="flex"; }
function openReport(){ reportBox.style.display="flex"; }
function loadHistory(){ socket.emit("getHistory"); }

</script>

</body>
</html>
